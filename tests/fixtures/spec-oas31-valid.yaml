openapi: 3.1.0
info:
  title: OAS 3.1 Test API
  version: '1.0.0'
paths:
  /items:
    get:
      summary: List items
      operationId: listItems
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemList'
webhooks:
  itemCreated:
    post:
      summary: Fired when an item is created
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Item'
      responses:
        '200':
          description: Received
components:
  schemas:
    ItemList:
      type: array
      prefixItems:
        - $ref: '#/components/schemas/Item'
      items: false
    Item:
      type: object
      $defs:
        ItemId:
          type: string
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string
