    LegDto:
      type: object
      description: >-
        A Leg IS AN object THAT describes a part of a Trip between two Tariff
        Locations
      properties:
        legId:
          type: integer
          description: >-
            A legId IS A unique identifier THAT distinguishes one Leg from all
            other Legs
          format: int64
        inspectionId:
          type: integer
          description: >-
            AN inspectionId IS A unique identifier THAT references the
            inspection event
          format: int64
        inspectorId:
          type: integer
          description: >-
            AN inspectorId IS A unique identifier THAT references the inspection
            officer that conducted the inspection event
          format: int64
        checkinTransactionTimestamp:
          type: string
          description: >-
            A checkInTransactionTimestamp IS A Transaction Timestamp THAT
            describes when the Transaction was created
          format: date-time
        checkoutTransactionTimestamp:
          type: string
          description: >-
            A checkOutTransactionTimestamp IS A Transaction Timestamp THAT
            describes when the Transaction was created
          format: date-time
        checkinLocation:
          description: >-
            A checkInLocation IS A Tariff Location THAT presents the Location at
            which the Leg has started
          $ref: '#/components/schemas/StopDto'
        checkoutLocation:
          description: >-
            A checkOutLocation IS A Tariff Location THAT presents the Location
            at which the Leg has ended
          $ref: '#/components/schemas/StopDto'
        baseRate:
          type: integer
          description: >-
            A baseRate IS AN amount THAT represents the price for the Leg
            without discounts and surcharges
          format: int64
        lineId:
          type: string
          description: >-
            A lineId IS AN identifier THAT references the Line from the CheckIn
            Transaction of the Leg (or from CheckOut in case CheckIn is missing)
        lineName:
          type: string
          description: >-
            A lineName IS A name THAT represent the Line referenced by the Line
            Id in a human-readable form
        networkId:
          type: string
          description: >-
            A networkId IS A unique identifier THAT distinguishes one Network
            from all other Networks
        networkName:
          type: string
          description: >-
            A networkName IS A name THAT represent the Network referenced by the
            Network Id in a human-readable form
        fare:
          type: integer
          description: >-
            A fare IS AN amount THAT represents the price of the Leg with discounts and surcharges
          format: int64
        fareState:
          type: string
          description: >-
            A fareState IS AN enumerated identifier THAT defines if the Fare is
            definitive and can be used for the collection of funds
          enum:
            - CALCULATED
            - PROVISIONAL
            - FALLBACK
        currency:
          type: string
          description: >-
            A currency IS AN enumerated identifier THAT references in which
            currency all amounts within the Leg are expressed
        products:
          type: array
          description: >-
            products IS A collection THAT contains Products that are applied to
            the current Leg
          items:
            $ref: '#/components/schemas/ProductDto'
        auditing:
          type: object
          properties: {}
          description: >-
            AN auditing IS AN object THAT contains Audit data if it is embedded
            in the Leg
        appliedTimePeriods:
          type: array
          description: >-
            appliedTimePeriods IS A collection of Time Periods THAT are applied
            to the current Leg
          items:
            $ref: '#/components/schemas/TimePeriodDto'
        appliedZones:
          type: array
          description: >-
            appliedZones IS A collection of Fare Zones THAT are applied to the
            current Leg
          items:
            $ref: '#/components/schemas/ZoneDto'
        tariffJourneyStart:
          type: boolean
          description: >-
            A tariffJourneyStart IS A boolean THAT indicates if the Leg is the
            start of a new Tariff Journey
        tariffDistance:
          type: number
          description: >-
            tariffDistance IS AN amount THAT describes the accumulated tariff
            distance over all segments of this Leg
        aggrGeoIntervalDistance:
          type: number
          description: >-
            aggrGeoIntervalDistance IS AN amount THAT describes the accumulated
            tariff distance over all legs of the current Tariff Journey that use
            degressive geo-interval pricing
        topoDistance:
          type: integer
          description: >-
            A topoDistance IS AN amount THAT describes the accumulated
            topographical distance over all segments of this Leg
        concessionId:
          type: string
          description: >-
            A concessionId IS AN identifier THAT references the public transport
            concession area the current Leg belongs to
    LineDto:
      type: object
      description: A Line IS A ... THAT ...
      properties:
        lineId:
          type: string
          description: A lineId IS A unique identifier THAT distinguishes this Line instance from all other Line instances
        lineName:
          type: string
          description: A lineName IS A name THAT represent a specific Line in a human-readable way
    ProductDto:
      type: object
      properties:
        productInstanceId:
          type: integer
          description: A productInstanceId IS AN unique identifier THAT distinguishes the implementation of a specific Product from all other instances
          format: int64
        productTemplateId:
          type: string
          description: A productTemplateId IS A unique identifier THAT references the Private Code of a Product in the Product Catalogue or a Sales Package in the Sales Package Catalogue
        productCommercialName:
          description: AN productCommercialName IS A name THAT represents the Product in a human-readable way
          $ref: '#/components/schemas/PropertyBagDto'
        productIcon:
          type: string
          description: A productIcon IS A URL THAT describes where the icon for this specific Product is stored
        validFrom:
          type: string
          description: validFrom IS A date, time and time zone indication THAT describes the start of the Product validity
          format: date-time
        validUntil:
          type: string
          description: validUntil IS A date, time and time zone indication THAT describes the end of the Product validity
          format: date-time
        purchaseDateTime:
          type: string
          description: purchaseDateTime IS A date, time and time zone indication THAT describes the moment when the Sales Package was purchased
          format: date-time
        productPropertyBag:
          description: A productPropertyBag IS A Property Bag THAT contains additional properties as key-value pairs for a Product
          $ref: '#/components/schemas/PropertyBagDto'
        organisationName:
          type: string
          description: AN organisationName IS A name THAT describes the name of the Product Owner
        weight:
          type: integer
          description: A weight IS AN amount THAT determines the contribution of this particular Product to the fare of the Leg
          format: int64
        appliedMetric:
          type: string
          description: appliedMetric IS AN enumerated identifier THAT describes the type of appliedValue
        appliedValue:
          type: integer
          description: appliedValue IS AN amount THAT describes either the base fare price or amount of the discount that has been applied by the Product
          format: int64
        xprofit:
          type: string
