          example: Students profile.
        validPeriod:
          description: A validPeriod IS A date time range THAT describes a starting and inclusive ending date
          $ref: '#/components/schemas/PeriodDateTimeInclusive'
        xprofit:
          type: string
          description: AN xprofit IS A token THAT references a Profile instance relating to the Business Entity of the callee
          format: uuid
          example: 5d6a84a8-31b0-4be0-9ae8-b254b7abf869
    ExternalSalesPackageOutput:
      required:
