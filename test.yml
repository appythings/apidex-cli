              relationType:
                type: string
                description: >-
                  The relation the referenced transaction has with this transaction
                enum:
                  - UNKNOWN
                  - ENTRY
                  - EXIT
                  - INSPECTION
                  - PRELIMINARY_ENTRY
                  - PRELIMINARY_EXIT
        routeSegments:
          type: array
          description: Ordered list of RouteSegments
          items:
            type: object
            properties:
              lineName:
                type: string
                description: Name of a line
              linePublicNbr:
                type: string
                description: Public identifier of a line
              routeId:
                type: string
                description: Public identifier of a route
              tripId:
                type: string
                description: >-
                  Trip from a vehicle perspective, decimal in string encapsulation
              tripPublicNbr:
                type: string
                description: Trip as displayed to the public
              tripType:
                type: string
                description: Type of the trip
                enum:
                  - UNDEFINED
                  - COMMERCIAL
                  - NONCOMMERCIAL
              tripDepartTime:
                type: string
                description: Depart timestamp of the trip
              tripDirection:
                type: string
                description: Direction of the trip
                enum:
                  - UNDEFINED
                  - INBOUND
                  - OUTBOUND
                  - NORTHBOUND
                  - EASTBOUND
                  - SOUTHBOUND
                  - WESTBOUND
                  - CLOCKWISE
                  - COUNTER_CLOCKWISE
              from:
                type: string
                description: Corresponds to a tariffLocationId where the segment started
              to:
                type: string
                description: >-
                  Corresponds to a tariffLocationId where the segment ended. If this segment is the current segment, this is equal to the tariffLocationId in the TransactionMetadata
              fromStop:
                $ref: '#/components/schemas/StopDto'
              toStop:
                $ref: '#/components/schemas/StopDto'
              distanceCovered:
                minimum: 0
                type: integer
                description: 'Distance covered in this segment, in meters'
              zonesCrossed:
                minimum: 0
                type: integer
                description: Number of zones crossed
              concession:
                type: string
                description: Identifier of the PTO concession the segment belongs to
              passengerClass:
                type: string
                description: Class of travel
                enum:
                  - UNDEFINED
                  - FIRST
                  - SECOND
                  - SERVICE_PROVIDER
        paymentType:
          type: string
          description: >-
            Enum, which defines the type of the payment. "EMV" - EuroCard, MasterCard, Visa, "DDM" - Direct debit mandate, "SSP" - Self service platform, external payment, "BAL" - Internal account balance, "POSTPAID" - Postpaid payment provider
          enum:
            - EMV
            - DDM
            - SSP
            - BAL
            - POSTPAID
        paymentProof:
          type: string
          description: Base64 encoded hash of the payment
        signature:
          type: object
          properties:
            keyType:
              type: string
              description: Type of the key
              enum:
                - NONE
                - HASH
                - PKI
                - AUTKEY
            keyId:
              type: string
              description: Key Id
            keyVersion:
              type: integer
              description: Key Version
            witness:
              type: string
              description: Signature
            isValid:
              type: boolean
              description: Validity flag
            validationErrorCode:
              type: integer
              description: Validation error code
          description: Signature object
        issuingBank:
          type: string
          description: Bank issuing the card
        issuerCountry:
          type: string
          description: Country of the issuing bank
        emvCardType:
          type: string
          description: Type of the EMV card
        emvBrand:
          type: string
          description: Brand of the card
        receivedAt:
          type: string
          description: Timestamp the transaction was received by back office
          format: date-time
        validationState:
          description: State of the validation
          type: array
          items:
            type: string
        isGoodForSettlement:
          type: boolean
          description: >-
            Flag determining the ability of the transaction to be proccesed for settlement
    TransactionDto:
      type: object
      properties:
        transactionId:
          type: string
          description: A transactionId IS A unique identifier THAT is generated by the GBO and assigned to every Transaction that is received
        transactionReference:
          type: string
          description: >-
            A transactionReference IS AN unique identifier THAT is assigned by the callee
        transactionType:
          type: string
