            A paymentReason IS AN enumerated identifier THAT describes the reason for which the Payment was created
            "TRIP" - Payment for the trip, "REFUND" - Refund payment in case original price was corrected, "RESERVATION" - Reservation of money for future trips (pre-authorisation), "ACCOUNT_VERIFICATION" - Zero value payment or reservation to verify account, "DEBT_RECOVERY" - Recovery of debt caused by previously rejected payment, "CANCEL_RESERVATION" - Cancelation of not used amount reservation, "CANCEL" - Cancelation of payment, "BALANCE_CREATE" - system internal account balance is created in following scenarios: Goodwill to trip, Trip reconstruction or correction, Excessive payment amount caused by external settlement, Fallback due to failed EMV refund, "BALANCE_CREATE_GOODWILL" - Customer Service of PTO handles the complaint of a customer and decides on leniency toward the already paid amount
          enum:
            - TRIP
            - REFUND
            - RESERVATION
            - ACCOUNT_VERIFICATION
            - DEBT_RECOVERY
            - CANCEL_RESERVATION
            - CANCEL
            - BALANCE_CREATE
            - BALANCE_CREATE_GOODWILL
        rejectionReason:
          type: string
          description: A rejectionReason IS AN enumerated identifier THAT describes if the Payment was rejected because of a known reason (RFU)
          enum:
            - REJECTED
            - UNKNOWN
        currency:
          type: string
          description: A currency IS AN enumerated identifier THAT references in which currency all amounts within the Payment are expressed (ISO 4217)
        paymentId:
          type: string
          description: A paymentId IS AN unique identifier THAT distinguishes a Payment from all other Payments
        paymentMethodIcon:
          type: string
          description: A paymentMethodIcon IS AN URL THAT references the location of an icon corresponding to the Payment method
        loyaltyOrDiscount:
          type: boolean
          description: A loyaltyOrDiscount IS A boolean THAT indicates if a discount Product was applied (RFU)
        serviceReferenceId:
          type: string
          description: A serviceReferenceId IS A identifier THAT can be used externally by end users to refer to this Payment and is shown on their bank statement
        paymentMethodName:
          type: string
          description: >-
            A paymentMethodName IS AN enumerated identifier THAT defines the used payment method
            "EMV" - EuroCard, MasterCard, Visa, "DDM" - Direct debit mandate, "SSP" - Self service platform, external payment, "BAL" - Internal account balance, "POSTPAID" - Postpaid payment provider
          enum:
            - EMV
            - DDM
            - SSP
            - BAL
            - POSTPAID
            - BUNQ_EPURSE
        status:
          type: string
          description: A status IS AN enumerated identifier THAT describes the result of the Payment
          enum:
            - OK
            - REJECTED
            - TECHNICAL_ERROR
        balanceReferenceId:
          type: string
          description: A balanceReferenceId IS A unique identifier THAT references the Account Balance that is the funding source for this Payment
        paymentMethodId:
          type: string
          description: A paymentMethodId IS A unique identifier THAT references the Payment Method Provider
        paymentProviderName:
          type: string
          description: A paymentProviderName IS A name THAT represents the Payment Provider in a human-readable way
        paymentMethodMode:
          type: string
          description: A paymentMethodMode IS AN enumerated identifier THAT describes the mode of the Payment Method Provider
        paymentProviderBusinessEntityId:
          type: string
          description: A paymentProviderBusinessEntityId IS AN unique identifier THAT references the Business Entity ID of the Payment Service Provider
        paymentReference:
          type: string
          description: A paymentReference IS A unique identifier THAT internally distinguishes a Payment from all other Payments
        originalPaymentReference:
          type: string
          description: AN originalPaymentReference IS A unique identifier THAT refers to the original Payment
    PaymentSummaryDto:
      type: object
      properties:
        totalDue:
          type: integer
          description: A totalDue IS AN amount in cents THAT is due for this Payment
        totalPaid:
          type: integer
          description: A totalPaid IS AN amount in cents THAT describes the amount actually paid as a result of this Payment
        totalGoodwill:
          type: integer
          description: >-
            The totalGoodwill is a value that describes the summation of the payments to the Passenger as Goodwill.
        total:
          type: integer
          description: >-
            The total is a value that is the result of totalDue minus totalPaid minus totalGoodwill as present on the Receipt.
        currency:
          type: string
          description: A currency IS AN enumerated identifier THAT references in which currency all amounts within the Payment are expressed (ISO 4217)
    PropertyBagDto:
