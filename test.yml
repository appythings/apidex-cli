openapi: 3.0.1
info:
  title: FareGo Suite API Overview
  description: >
    The following API calls are available for use by different Business Entities with explicit roles within the FareGo Suite. The roles are defined via role based access controls (RBAC) within the API Gateway.


    These roles are defined by the purpose of the Business Entity within the system.


    The various API calls are grouped together as a block of calls by the Resource Controller on which they interact with.


    Each block has it's own 100 range of calls to help facilitate identification of what Resource Controller an API interacts with.


    __Examples:__

    * Calls relating to Passenger Accounts occupy the 80xx range.

    * Calls relating to Tranist Accounts occupy the 81xx range.


    Where appropriate you will see the related tokenised identifier for the Resource that the API interacts with.

  contact:
    email: help@farego-helpdesk.com
  version: 3.6.3
tags:
  - name: Passenger-Accounts
    description: (80xx) Management of Passenger Accounts - xPAT
servers:
  - url: 'https://api.sbx.idbt.translink.nl/api/v3'
    description: Sandbox
paths:
  /passenger-accounts:
    post:
      tags:
        - Passenger-Accounts
      summary: 8001 - Create-Empty-Passenger-Account
      description: >-
        This API creates an empty passenger account.



        The purpose of a passenger account is to be a container for multiple transit accounts that belong to a single customer. A passenger account is identified by an xPAT (external passenger account token) with which it is possible to manage a list of transit accounts. A passenger account holds a list with transit accounts. 



        To allow a consuming system to connect the passenger account to a resource in it's local system (such as a CRM system or a mobile application) it is required to register an external account id. The external account id is the indentifier of the local resource.



        After the creation of an empty passenger account it is possible to bind transit accounts to the created passenger account. 



        The API requires an external account id as input (that is the Id used by the local application) and returns an external passenger account number (xPAT) that could be used to access the passenger acount. Through the external acount ID the passenger account is linked to a resource in the local application. Examples of a local application are a CRM and a mobile application. It is not possible to access the passenger account through the external account id. The local application should store and use the xPAT to access the passenger account.
      operationId: API-8001_Create_Passenger-Accounts
      security:
        - OAuthAuthorization:
            - default
      requestBody:
        description: >-
          The body contains one mandatory parameter <i>externalAccountId</i>.

          Parameter was originally intended for storing of identifier that serves as a link to other system.

          For example if CRM system is creating new passanger account in IDBT system, it can store here ID of passenger account in CRM.

          This way a caller might link his own passenger account representation with IDBT passenger account.

          This parameter is not interpreted by IDBT system in any way. Basically a caller can store arbitrary string here (e.g. "N/A").

          This attribute of passenger account does not have to be unique and can be updated afterwards.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatRequest'
            examples:
              Create passenger account:
                $ref: '#/components/examples/createPassengerAccountNormal'
              Create passenger account - externalAccountId not used:
                $ref: '#/components/examples/createPassengerAccountNA'
      responses:
        '201':
          description: CREATED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslationResponse'
              example:
                value: fe21d2d1-7220-4759-9d81-452f4ad60ba1
                type: xpat
        '400':
          description: |-
            Bad Request

            List of possible error codes:
            <ul>
              <li>TM0003 - Missing mandatory input(s)</li>
              <li>TM0202 - Unknown business entity</li>
            </ul>
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Unknown Business entity - missing input:
                  $ref: '#/components/examples/unknownBusinessEntityMissingInput400'
                Unknown business entity - not found:
                  $ref: '#/components/examples/unknownBusinessEentityNotFound400'
                Missing mandatory input:
                  $ref: '#/components/examples/missingMandatoryInputsError400'
        '500':
          description: >-
            Internal Server Error

            Failed to execute due to internal problems (e.g. failed to access data within database). List of possible error codes:

            <ul>


              <li>TM0001 - Internal system error</li>
            </ul>
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                DB access passenger account error:
                  $ref: >-
                    #/components/examples/dbAccessExternalPassengerAccountError500
                Cache access error:
                  $ref: '#/components/examples/cacheAccessError500'
                Cache cast error:
                  $ref: '#/components/examples/cacheCastError500'
  '/passenger-accounts/{xPAT}':
    get:
      tags:
        - Passenger-Accounts
      summary: 8002 - Look Up Passenger-Accounts
      description: >-
        This API returns the xTAT's of the transit account that are bound to the passenger account.



        The purpose of a passenger account is to be a container for multiple transit accounts that belong to a single customer. A passenger account is identified by an xPAT with which it is possible to manage a list of transit accounts (identified by an xTAT). A passenger account holds a list with transit accounts. 



        The API requires the xPAT identifier of the passenger account for which the transit accounts need to be returned.
      operationId: API-8002_Look_Up_Passenger-Accounts
      security:
        - OAuthAuthorization:
            - default
      parameters:
        - name: xPAT
          in: path
          description: External Passenger Account Token
          required: true
          schema:
            type: string
            format: uuid
            example: bf44ddfe-dbb2-421a-93d6-5f24bb2480fb
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalPassengerAccountResponse'
              examples:
                Empty passenger accout:
                  $ref: '#/components/examples/emptyPassengerAccount200'
                Passenger account with 3 transit accounts:
                  $ref: '#/components/examples/passengerAccountWith3TAs200'
        '400':
          description: |-
            Bad Request
            List of possible error codes:
            <ul>
              <li>TM0002 - Invalid input data</li>
              <li>TM0202 - Unknown business entity</li>
              <li>TM0222 - Unknown external passenger account token</li>
            </ul>
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Invalid input data - external PAT:
                  $ref: '#/components/examples/invalidInputDataPAT400'
                Unknown business entity - missing input:
                  $ref: '#/components/examples/unknownBusinessEntityMissingInput400'
                Unknown External PAT:
                  $ref: '#/components/examples/unknownExternalPAT400'
        '500':
          description: >-
            Internal Server Error

            Failed to execute due to internal problems (e.g. failed to access data within database). List of possible error codes:

            <ul>


              <li>TM0001 - Internal system error</li>
            </ul>
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Internal system error:
                  $ref: '#/components/examples/internalSystemError500'
    put:
      tags:
        - Passenger-Accounts
      summary: 8003 - Update Passenger-Account
      description: >-
        This API changes the external Account ID of a passenger account. 



        The purpose of a passenger account is to be a container for multiple transit accounts that belong to a single customer. A passenger account is identified by an xPAT with which it is possible to manage a list of transit accounts (identified by an xTAT). A passenger account does not hold any data other then the list with transit accounts. Travel related data (payments, trips, products, alerts) should be accessed through a transit account or a token.



        To allow a consuming system to connect the passenger account to a resource in it's local system (such as a CRM system or a mobile application) it is possible to register an external account id which is the indentifier of the local resource.





        The API requires a passenger acount number (xPAT) and the new external account-id.
      operationId: API-8003_Update_Passenger-Account
      security:
        - OAuthAuthorization:
            - default
      parameters:
        - name: xPAT
          in: path
          description: xPAT
          required: true
          schema:
            type: string
            format: uuid
            example: 3e60fbae-ec12-4d28-92fd-41d01c5b80a4
      requestBody:
        description: >-
          The body contains attributes that should be changed. The only one allowed attribute is the external passenger account ID.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatRequest'
      responses:
        '204':
          description: NO CONTENT
        '400':
          description: |-
            Bad Request

            List of possible error codes:
            <ul>
              <li>TM0003 - Missing mandatory input(s)</li>
              <li>TM0202 - Unknown business entity</li>
              <li>TM0222 - Unknown external passenger account token</li>
            </ul>
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                errorMessage:
                  referenceId: c4839b50-3be3-4311-b133-e8071b1356e7
                  message: Unknown business entity.
                businessExceptions:
                  - code: TM0202
                    message: Unknown business entity.
        '500':
          description: >-
            Internal Server Error


            Failed to execute due to internal problems (e.g. failed to access data within database). List of possible error codes:

            <ul>


              <li>TM0001 - Internal system error</li>
            </ul>
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                errorMessage:
                  referenceId: b0d98c6b-3e3d-4d9f-a33d-af40b6a21765
                  message: Internal system error
                businessExceptions:
                  - code: TM0001
                    message: Internal system error
  '/passenger-accounts/{xPAT}/transit-accounts/{xTAT}':
    put:
      tags:
        - Passenger-Accounts
      summary: 8053 - Bind Transit-Account to Passenger-Account
      description: >-
        This API binds a transit account to a passenger account. 



        The API requires a passenger acount number (xPAT) and the identifer of the transit account (xBOT) that a customer wants to bind. 



        After the transit account is bound the transuit account will appear in the list of transit account when the passenger account is accessed.



        The purpose of a passenger account is to be a container for multiple transit accounts that belong to a single customer. A passenger account is identified by an xPAT with which it is possible to manage a list of transit accounts (identified by an xTAT). A passenger account does not hold any data other then the list with transit accounts. Travel related data (payments, trips, products, alerts) should be accessed through a transit account or a token.



        The purpose of a transit account is to hold the payment methods, the products (sales packages), tariff profiles and the token that is used during travel. An example of a token is an EMV card. Although multiple tokens could be connected only one can be active.

      operationId: API-8053_Bind_Transit-Account_to_Passenger-Account
      security:
        - OAuthAuthorization:
            - default
      parameters:
        - name: xPAT
          in: path
          description: external passenger account token (ID of passenger account)
          required: true
          schema:
            type: string
            format: uuid
            example: e8bc073f-2408-4dbe-8781-4c33df25e9a8
        - name: xTAT
          in: path
          description: external transit account token (ID of transit account)
          required: true
          schema:
            type: string
            format: uuid
            example: e7fa3392-646b-40e2-95a6-c417dc0b0969
      responses:
        '204':
          description: >-
            NO CONTENT


            Transit account was successfully bound to the passenger account.


            Important: Response 204 is returned also in case that this transit account was already bound to specified Passenger Account

            (because PUT is idempotent operation).
        '400':
          description: |-
            Bad Request
            Failed to bind transit account. List of possible error codes:
            <ul>
              <li>TM0202 - Unknown business entity</li>
              <li>TM0207 - Unknown external transit account token</li>
              <li>TM0222 - Unknown external passenger account token</li>
            </ul>
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Unknown business entity - missing input:
                  $ref: '#/components/examples/unknownBusinessEntityMissingInput400'
                Unknown external transit account token - invalid format:
                  $ref: '#/components/examples/unknownExternalTAT400'
                Unknown external passenger account token - invalid format:
                  $ref: '#/components/examples/unknownExternalPAT400'
        '500':
          description: >-
            Internal Server Error

            Failed to execute due to internal problems (e.g. failed to access data within database). List of possible error codes:

            <ul>


              <li>TM0001 - Internal system error</li>
            </ul>
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Internal system error:
                  $ref: '#/components/examples/dbAccessTransitAccountError500'
    delete:
      tags:
        - Passenger-Accounts
      summary: 8054 - Unbind Transit-Account from Passenger-Account
      description: >-
        This API unbinds a transit account from a passenger account. After the transit account is unbound the transit account will nolonger appear in the list of transit account when the passenger account is accessed.



        The API requires a passenger account number (xPAT) and the identifer of the transit account (xTAT) that a customer wants to unbind. 



        The purpose of a passenger account is to be a container for multiple transit accounts that belong to a single customer. A passenger account is identified by an xPAT with which it is possible to manage a list of transit accounts (identified by an xTAT). A passenger account does not hold any data other then the list with transit accounts. Travel related data (payments, trips, products, alerts) should be accessed through a transit account or a token.



        The purpose of a transit account is to hold the payment methods, the products (sales packages) and the medium that is used during travel. A medium is also referred to as token. An example of a token or medium is an EMV card. Although multiple media could be connected only one can be active. The mechanism to differentiate between a medium and a transit account is that through the transit account it is possible to replace the token, keep the connection with the payment methods and products and the full history of trips and payments. 

        A transit account is identified by an external transit account number xTAT. A passenger account does not hold any data other then the list with identifiers of transit accounts. Travel related data (payments, trips, products, alerts) should be accessed through a transit account or a token.

      operationId: API-8054_Unbind_Transit-Account_from_Passenger-Account
      security:
        - OAuthAuthorization:
            - default
      parameters:
        - name: xPAT
          in: path
          description: external passenger account token (ID of passenger account)
          required: true
          schema:
            type: string
            format: uuid
            example: e8bc073f-2408-4dbe-8781-4c33df25e9a8
        - name: xTAT
          in: path
          description: external transit account token (ID of transit account)
          required: true
          schema:
            type: string
            format: uuid
            example: e7fa3392-646b-40e2-95a6-c417dc0b0969
      responses:
        '204':
          description: |-
            NO CONTENT

            Transit account was successfully unbound from the passenger account.
        '400':
          description: |-
            Bad Request
            Failed to unbind transit account. List of possible error codes:
            <ul>
              <li>TM0202 - Unknown business entity</li>
              <li>TM0207 - Unknown external transit account token</li>
              <li>TM0222 - Unknown external passenger account token.</li>
              <li>TM0223 - Transit account is not bound to the specified passenger account.</li>
            </ul>
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Unknown Business entity - missing input:
                  $ref: '#/components/examples/unknownBusinessEntityMissingInput400'
                Unknown external transit account token:
                  $ref: '#/components/examples/unknownExternalTAT400'
                Unknown external passenger account token:
                  $ref: '#/components/examples/unknownExternalPAT400'
                Transit account token not bount to passenger account token:
                  $ref: '#/components/examples/notBountTATtoPAT400'
        '500':
          description: >-
            Internal Server Error

            Failed to execute due to internal problems (e.g. failed to access data within database). List of possible error codes:

            <ul>


              <li>TM0001 - Internal system error</li>
            </ul>
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Internal system error - db access problem:
                  $ref: '#/components/examples/dbAccessPassengerAccountError500'
  '/passenger-accounts/{xPAT}/transit-accounts/id-media/types/{mediumType}/engravedid/{EID}':
    put:
      tags:
        - Passenger-Accounts
      summary: 8055 - Bind Transit-Account to Passenger-Account by EngravedId
      description: |-
        Binds transit account identified by EngravedId of a Medium
        (EID) to the Passenger Account identified by external passenger account
        token (xPAT).
      operationId: API-8055_Bind_Transit-Account_to_Passenger-Account_by_EngravedId
      security:
        - OAuthAuthorization:
            - default
      parameters:
        - name: xPAT
          in: path
          description: external passenger account token (ID of passenger account)
          required: true
          schema:
            type: string
            format: uuid
            example: e8bc073f-2408-4dbe-8781-4c33df25e9a8
        - name: mediumType
          in: path
          description: type of Token
          required: true
          schema:
            type: string
            enum:
              - OVC
              - EMV
              - GemaltoPure
              - MasterCardWL
              - Cibo
              - GBO
        - name: EID
          in: path
          description: EngravedId
          required: true
          schema:
            type: string
      responses:
        '204':
          description: >-
            NO CONTENT


            Transit account was successfully bound to the passenger account.


            Important: Response 204 is returned also in case that this transit account was already bound to specified Passenger Account

            (because PUT is idempotent operation).
        '400':
          description: |-
            Bad Request
            Failed to bind transit account. List of possible error codes:
            <ul>
              <li>TM0202 - Unknown business entity</li>
              <li>TM0207 - Unknown external transit account token</li>
              <li>TM0222 - Unknown external passenger account token</li>
            </ul>
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Unknown business entity - missing input:
                  $ref: '#/components/examples/unknownBusinessEntityMissingInput400'
                Unknown external transit account token - invalid format:
                  $ref: '#/components/examples/unknownExternalTAT400'
                Unknown external passenger account token - invalid format:
                  $ref: '#/components/examples/unknownExternalPAT400'
        '500':
          description: >-
            Internal Server Error

            Failed to execute due to internal problems (e.g. failed to access data within database). List of possible error codes:

            <ul>


              <li>TM0001 - Internal system error</li>
            </ul>
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Internal system error:
                  $ref: '#/components/examples/dbAccessTransitAccountError500'
    delete:
      tags:
        - Passenger-Accounts
      summary: 8056 - Unbind Transit-Account from Passenger-Account using Engraved ID
      description: >-
        This API unbinds a transit account from a passenger account. After the transit account is unbound the transit account will nolonger appear in the list of transit account when the passenger account is accessed.



        The API requires a passenger account number (xPAT) and the identifer of the transit account (engraveid) that a customer wants to unbind. Note that the engraveid is an secondary identifier of a transit account. The primary identifier is the xTAT. It is the xTAT that is unbound from the passenger account and will nolonger appear in the list when the passenger account is accessed.



        The purpose of a passenger account is to be a container for multiple transit accounts that belong to a single customer. A passenger account is identified by an xPAT with which it is possible to manage a list of transit accounts (identified by an xTAT). A passenger account does not hold any data other then the list with transit accounts. Travel related data (payments, trips, products, alerts) should be accessed through a transit account or a token.



        The purpose of a transit account is to hold the payment methods, the products (sales packages) and the medium that is used during travel. A medium is also referred to as token. An example of a token or medium is an EMV card. Although multiple media could be connected only one can be active. The mechanism to differentiate between a medium and a transit account is that through the transit account it is possible to replace the token, keep the connection with the payment methods and products and the full history of trips and payments. 

        A transit account is identified by an external transit account number xTAT. A passenger account does not hold any data other then the list with identifiers of transit accounts. Travel related data (payments, trips, products, alerts) should be accessed through a transit account or a token.

      operationId: API-8056_Unbind_Transit-Account_from_Passenger-Account_by_EngravedId
      security:
        - OAuthAuthorization:
            - default
      parameters:
        - name: xPAT
          in: path
          description: external passenger account token (ID of passenger account)
          required: true
          schema:
            type: string
            format: uuid
            example: e8bc073f-2408-4dbe-8781-4c33df25e9a8
        - name: mediumType
          in: path
          description: type of Token
          required: true
          schema:
            type: string
            enum:
              - OVC
              - EMV
              - GemaltoPure
              - MasterCardWL
              - Cibo
              - GBO
        - name: EID
          in: path
          description: EngravedId
          required: true
          schema:
            type: string
      responses:
        '204':
          description: |-
            NO CONTENT

            Transit account was successfully unbound from the passenger account.
        '400':
          description: |-
            Bad Request
            Failed to unbind transit account. List of possible error codes:
            <ul>
              <li>TM0202 - Unknown business entity</li>
              <li>TM0207 - Unknown external transit account token</li>
              <li>TM0222 - Unknown external passenger account token.</li>
              <li>TM0223 - Transit account is not bound to the specified passenger account.</li>
            </ul>
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Unknown Business entity - missing input:
                  $ref: '#/components/examples/unknownBusinessEntityMissingInput400'
                Unknown external transit account token:
                  $ref: '#/components/examples/unknownExternalTAT400'
                Unknown external passenger account token:
                  $ref: '#/components/examples/unknownExternalPAT400'
                Transit account token not bount to passenger account token:
                  $ref: '#/components/examples/notBountTATtoPAT400'
        '500':
          description: >-
            Internal Server Error

            Failed to execute due to internal problems (e.g. failed to access data within database). List of possible error codes:

            <ul>


              <li>TM0001 - Internal system error</li>
            </ul>
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Internal system error - db access problem:
                  $ref: '#/components/examples/dbAccessPassengerAccountError500'
  '/passenger-accounts/{xPAT}/transit-accounts/id-media/tokens/xbot/{xBOT}':
    put:
      tags:
        - Passenger-Accounts
      summary: 8057 - Bind Transit-Account to Passenger-Account by xBOT
      description: |-
        Binds transit account identified by external backoffice token
        (xBOT) to the Passenger Account identified by external passenger account
        token (xPAT).
      operationId: API-8057_Bind_Transit-Account_to_Passenger-Account_by_xBOT
      security:
        - OAuthAuthorization:
            - default
      parameters:
        - name: xPAT
          in: path
          description: external passenger account token (ID of passenger account)
          required: true
          schema:
            type: string
            format: uuid
            example: e8bc073f-2408-4dbe-8781-4c33df25e9a8
        - name: xBOT
          in: path
          required: true
          schema:
            type: string
            format: uuid
            example: e1307c73-676a-4d07-967b-6141276f7c7c
          description: External BackOffice Token (identifier)
      responses:
        '204':
          description: >-
            NO CONTENT


            Transit account was successfully bound to the passenger account.


            Important: Response 204 is returned also in case that this transit account was already bound to specified Passenger Account

            (because PUT is idempotent operation).
        '400':
          description: |-
            Bad Request
            Failed to bind transit account. List of possible error codes:
            <ul>
              <li>TM0202 - Unknown business entity</li>
              <li>TM0207 - Unknown external transit account token</li>
              <li>TM0222 - Unknown external passenger account token</li>
            </ul>
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Unknown business entity - missing input:
                  $ref: '#/components/examples/unknownBusinessEntityMissingInput400'
                Unknown external transit account token - invalid format:
                  $ref: '#/components/examples/unknownExternalTAT400'
                Unknown external passenger account token - invalid format:
                  $ref: '#/components/examples/unknownExternalPAT400'
        '500':
          description: >-
            Internal Server Error

            Failed to execute due to internal problems (e.g. failed to access data within database). List of possible error codes:

            <ul>


              <li>TM0001 - Internal system error</li>
            </ul>
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Internal system error:
                  $ref: '#/components/examples/dbAccessTransitAccountError500'
components:
  schemas:
    AllowedPaymentMethodProvider:
      type: object
      properties:
        paymentMethodProviderId:
          type: string
          description: Payment Method Provider Id.
          format: uuid
        mediumTypeId:
          type: integer
          description: Payment Method Provider Id.
          format: int32
      description: Allowed Payment Method Providers.
    BusinessException:
      required:
        - code
        - message
      type: object
      properties:
        code:
          type: string
          description: error code consists of prefix following with 4 digit number
        message:
          type: string
          description: detail description of error message related to business rule
      description: describes exception related to the business rule
    ErrorMessage:
      required:
        - message
      type: object
      properties:
        referenceId:
          type: string
          description: UUID string used to lookup request in logs
          example: 74736650-0bc2-421f-9fe8-76436e23e033
        message:
          type: string
          description: 'Message describing error, possibly with cause'
      description: represents general error description
    ErrorResponse:
      required:
        - errorMessage
      type: object
      properties:
        errorMessage:
          $ref: '#/components/schemas/ErrorMessage'
        businessExceptions:
          type: array
          description: list of exception(s) related to business rule
          items:
            $ref: '#/components/schemas/BusinessException'
        fieldValidations:
          type: array
          description: optional list of field validation(s)
          items:
            $ref: '#/components/schemas/FieldValidation'
    FieldValidation:
      required:
