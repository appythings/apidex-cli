            Trip version number. New trip versions are created if fare has changed, a property other than fare has changed, a tap has been added, the trip has been outdated by another trip.
          format: int64
        tripStatus:
          type: string
          description: >-
            Enum, which defines the status of the trip. "COMPLETE" - has CKI and CKO, "CORRECTED" - was corrected by cardholder or support personnel, "CKI_EXPECTED" - system is waiting for a Check In transaction, "CKI_MISSING" - system stopped waiting for a Check In transaction, "CKO_EXPECTED" - system is waiting for a Check Out transaction, "CKO_MISSING" - system stopped waiting for a Check Out transaction, "ISN_PENDING" - inspection has taken place, but system is waiting for more transactions, "ISN_ONLY" - Inspection took place, but cardholder has not checked in
