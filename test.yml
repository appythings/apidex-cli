          description: AN outstandingPaymentAmount IS AN amount in cents THAT describes the outstanding amount to be settled for the Trip per current settlement day
          format: int64
        settlementDate:
          type: string
          description: A settlementDate IS A date THAT describes the settlement day
    TypeOfFareProductDto:
      type: object
      description: A TypeOfFareProductDto IS AN object THAT represents a Product Category type
      properties:
        privateCode:
          type: string
          description: A privateCode IS AN identifier THAT describes a type of Product Category
    ZoneDto:
      type: object
      properties:
        zoneId:
          type: string
