      properties:
        xbot:
          type: string
          description: A xBOT IS AN unique identifier THAT is an external representation of a backoffice Token for a particular Business Entity
          format: uuid
        paymentDateTime:
          type: string
          description: A paymentDateTime IS A date, time and time zone indication THAT describes when the Payment was initiated
          format: date-time
        totalDue:
          type: integer
          description: A totalDue IS AN amount in cents THAT is due for this Payment
          format: int64
        totalPaid:
          type: integer
          description: A totalPaid IS AN amount in cents THAT describes the amount actually paid as a result of this Payment
          format: int64
        paymentReason:
