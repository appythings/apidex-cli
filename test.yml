            Version of the product catalog from which the sales package was retrieved.
          nullable: true
          example: '1'
        packageAmount:
          $ref: '#/components/schemas/MonetaryAmount'
        name:
          type: string
          description: Name of the tariff location.
        description:
          type: string
          description: Description of the tariff location.
        salesChannelType:
          type: string
          description: 'Identifies the sales channel, related to a particular retailer.'
          example: webshop
        retailerId:
          type: string
          description: Retailer ID.
          nullable: true
        refundReason:
          type: string
          description: >-
            The reason of refund (only in case that the sales package was refunded).
          nullable: true
        refundBookingId:
          type: string
          description: The booking ID of refund sales packake transaction.
          nullable: true
        refundAmount:
          $ref: '#/components/schemas/MonetaryAmount'
        localization:
          type: array
          description: List of localized texts in the required language(s).
          items:
            $ref: '#/components/schemas/Localization'
        products:
          type: array
          description: Holds collection the products.
          items:
            $ref: '#/components/schemas/ProductLocalizationWrapper'
        salesTimestamp:
          type: string
          description: >-
            Timestamp of the sales moment in ISO 8601 format (yyyy-MM-ddTHH:mm:ssTZD).
          format: date-time
          example: '2021-07-05T09:41:03Z'
        xspit:
          type: string
          description: External sales package instance token.
          format: uuid
          example: 4b4a9121-fb93-4aef-99f1-1268bce9f9b6
      description: >-
        Sales packages with internal identifiers assigned to the transit account.
    ExternalTransitAccountResponse:
      required:
        - status
      type: object
      properties:
        status:
          type: string
          description: Status of the Transit Account.
        provisional:
          type: boolean
          description: Indicates whether the account is provisional.
          example: true
        swipedIn:
          type: boolean
          description: Indicates whether the account is swiped-in.
          example: true
        entrainmentData:
          type: string
          description: Entrainment - additional group checkin data
          example: >-
            [{"type":"ADULTS","count":1},{"type":"CHILDREN","count":5},{"type":"BIKES","count":6}]
        sdkId:
          type: string
          description: Mobile SDK-ID
          example: ca-app-pub-3940256099942544~3347511713
        additionalAttributes:
          $ref: '#/components/schemas/PropertyBag'
        media:
          type: array
          items:
            $ref: '#/components/schemas/ExternalMedium'
        paymentMethodInstances:
          type: array
          items:
            $ref: '#/components/schemas/ExternalPaymentMethodInstance'
        salesPackages:
          type: array
          items:
            $ref: '#/components/schemas/ExternalSalesPackageOutput'
        profileInstances:
          type: array
          items:
            $ref: '#/components/schemas/ExternalProfileInstance'
    Localization:
      type: object
      properties:
        language:
          type: string
          description: ISO 639 language code.
          example: en-US
        textType:
          type: string
          description: Text type (may be project specific).
          example: publicName
        text:
          type: string
          description: Localized text itself.
          example: PTO-1 Night Bus Discount Product
      description: List of localized texts in the required language(s).
    MonetaryAmount:
      required:
        - amount
        - currency
      type: object
      properties:
        amount:
          type: integer
          format: int64
        currency:
          type: string
      description: 'Amount corresponding to the product instance (amount, currency pair).'
      example:
        currency: USD
        amount: 350
    MonetaryAmountWithVAT:
      required:
        - amount
        - currency
      type: object
      properties:
        amount:
          type: integer
          format: int64
        currency:
          type: string
        vatPercentage:
          type: number
          format: double
      description: >-
        Amount corresponding to the product instance (amount, currency pair) with VAT.
      example:
        currency: USD
        amount: 350
        vatPercentage: 10
    NameInfo:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
    PeriodDateTimeInclusive:
      required:
        - fromInclusive
        - untilInclusive
      type: object
      description: A PeriodDateTimeInclusive IS AN object THAT describes a validity period including both the start and end dates
      properties:
        fromInclusive:
          type: string
          description: A fromInclusive IS A date and time indication THAT describes from when a time period starts in yyyy-MM-ddTHH:mm:sszzz
          format: date-time
        untilInclusive:
          type: string
          description: A untilInclusive IS A date and time indication THAT describes when a time period ends in yyyy-MM-ddTHH:mm:sszzz
          format: date-time
    ProductLocalizationWrapper:
      required:
        - salesItemProduct
      type: object
      properties:
        image:
          type: string
          description: URL pointing to the image (e.g. icon) associated with the product.
          example: icons/products/5002.svg
        url:
          type: string
          description: URL from tariff service associated with the product.
          example: products/5002
        salesItemProduct:
          $ref: '#/components/schemas/SalesItemProduct'
        localization:
          type: array
          description: List of localized texts in the required language(s).
          items:
            $ref: '#/components/schemas/Localization'
        typesOfFareProduct:
          type: array
          items:
            type: object
          description: Types of fare product.
          example:
            - privateCode: classSurcharge
      description: Holds collection the products.entrainmentData
    Profile:
      description: A Profile IS AN object THAT contains a set of attributes for a Passenger that influence the calculation of the 'full fare'
      type: object
      properties:
        profileType:
          type: string
          description: A profileType IS A unique identifier THAT is used to distinguish this Profile from all other Profiles
          example: '199900102'
        name:
          type: string
          description: A profileName IS A name THAT is used to describe the Profile in a human-readable way
          example: 'Disabled passenger'
        description:
          type: string
          description: A description IS A string THAT adds additional context to the Profile
          example: 'Disabled passenger eligible for disability discounts'
        alternativeTexts:
          type: array
          description: AN alternativeTexts IS A collection of AlternativeText THAT contains one or more translations for the name of the Profile
          items:
            $ref: '#/components/schemas/AlternativeText'
    ProfileRequest:
      required:
        - profileType
        - validPeriod
      type: object
      properties:
        profileType:
          type: string
          description: 'Identifies the type of profile (e.g. child, handicapped).'
        validPeriod:
          $ref: '#/components/schemas/ValidityPeriod'
    PropertyBag:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PropertyBagItem'
      description: Collection of the additional attributes provided as key value pairs.
    PropertyBagItem:
      required:
        - key
        - value
      type: object
      properties:
        key:
          type: string
          example: sub
        value:
          type: string
          example: '8632983369136338741'
      description: Property bag items.
    SalesItemProduct:
      required:
        - itemType
        - productTemplateId
        - validPeriod
      type: object
      properties:
        productTemplateId:
          type: string
          description: Product template identifier in the product catalogue.
          example: dba0b896-118d-4e9e-abf5-af264ced34c4
        validPeriod:
          $ref: '#/components/schemas/PeriodDateTimeInclusive'
        tariffVersionId:
          type: string
          description: Tariff version that contains the product template.
          example: '1'
        itemSeq:
          type: integer
          description: >-
            Sequence number of item. This field if optional. If it is set, the same value is set in the corresponding response.
          format: int32
          nullable: true
          example: 0
        productOwnerId:
          type: string
          description: Business entity id of the product owner organisation.
          nullable: true
          example: pto_4
        usablePeriod:
          $ref: '#/components/schemas/PeriodDateTimeInclusive'
        externalProductInstanceId:
          type: string
          description: External system product instance identifier.
          example: ed9cbd06-2fe7-4953-b0d7-e7793f29b467
        retailerReference:
          type: string
          description: Retailer reference.
        status:
          type: string
          description: Product status.
        chsProductInstanceId:
          type: string
          description: Product instance ID from clearing house system.
          example: 1268BCE9F9B6
        itemType:
          type: string
          description: Type of product.
          example: TRAVEL_PRODUCT
          enum:
            - TRAVEL_PRODUCT
            - STORED_VALUE
            - NON_TRAVEL_PRODUCT
        propertyBag:
          $ref: '#/components/schemas/PropertyBag'
        nameInfo:
          $ref: '#/components/schemas/NameInfo'
        itemAmount:
          $ref: '#/components/schemas/MonetaryAmountWithVAT'
        itemRefundAmount:
          $ref: '#/components/schemas/MonetaryAmountWithVAT'
        refundTimestamp:
          type: string
          description: >-
            Timestamp of the refund moment in ISO 8601 format (yyyy-MM-ddTHH:mm:ssTZD). Output only.
          format: date-time
          example: '2021-07-05T09:41:03Z'
        scheduledRefundTimestamp:
          type: string
          description: >-
            Timestamp when the refund should be done. If the refund request is sent with timestamp in the future (later than configured amount of minutes) the refund is scheduled and not done immediately. It is set in ISO 8601 format (yyyy-MM-ddTHH:mm:ssTZD). Output only.
          format: date-time
          example: '2021-07-05T09:41:03Z'
        parameters:
          oneOf:
            - type: object
            - type: array
              items: {}
          description: >-
            Additional product parameters. Parameters are not validated. Both json object and json array are supported as value.
          example: >-
            {"seriesConstraint":{"from":{"tariffLocationId":"8316"},"vias":[{"tariffLocationId":"8318"}],"to":{"tariffLocationId":"8321"}}}
    ValidityPeriod:
      required:
        - fromInclusive
      type: object
      properties:
        fromInclusive:
          type: string
          description: >-
            Date-time from which time period starts in format yyyy-MM-ddTHH:mm:sszzz.
          format: date-time
        untilInclusive:
          type: string
          description: >-
            Date-time at which time period ends in format yyyy-MM-ddTHH:mm:sszzz. If not set, default value (in not reachable future) will be taken
          format: date-time
      description: Validity period of the profile.
    VoidProfileRequest:
      type: object
      properties:
        expirationTimestamp:
          type: string
          example: '2019-11-20T19:48:00Z'
          description: >-
            Timestamp of the profile expiration in ISO 8601 format (yyyy-MM-ddTHH:mm:ssTZD). If not set, the current timestamp is taken
          format: date-time
    Accepted:
      type: object
      properties:
        referenceId:
          type: string
          description: Reference identifier of the response
    Address:
      type: object
      properties:
        street:
          type: string
          description: Street
          example: name
        houseNumber:
          type: string
          description: House number
          example: name
        postalCode:
          type: string
          description: Postal code
          example: name
        city:
          type: string
          description: City
          example: name
        country:
          type: string
          description: Country
          example: name
    Balance:
      type: object
      properties:
        xbot:
          type: string
          format: uuid
        xpmit:
          type: string
          format: uuid
        paymentProviderName:
          type: string
        status:
          type: string
        currentBalance:
          type: number
        currency:
          type: string
    BalancesResponse:
      type: object
      properties:
        balances:
          type: array
          items:
            $ref: '#/components/schemas/Balance'
    BunqAddress:
      type: object
      properties:
        name:
          type: string
          description: Delivery name and name on card
          example: name
        address:
          $ref: '#/components/schemas/Address'
      description: Parameters needed for creation of PaymentMethods from template.
    BusinessResult:
      type: object
      properties:
        code:
          type: string
          description: Error code
        message:
          type: string
          description: Error message
    CardDebtReason:
      enum:
        - NotAvailable
        - TooMuchDebt
      type: string
    CardDebtStatus:
      enum:
        - InDebt
        - NoDebt
        - NotAvailable
      type: string
    FieldValidationResult:
      type: object
      properties:
        field:
          type: string
          description: Field name
        message:
          type: string
          description: Error message
    GenericErrorResponse:
      required:
        - errorMessage
      type: object
      properties:
        errorMessage:
          type: object
          properties:
            message:
              type: string
              description: Error message
              example: The server responded with http status code 404
            referenceId:
              type: string
              description: Reference identification code
              example: BSS-1615326528285
          description: Error message object
        businessExceptions:
          type: array
          description: List of business exceptions
          items:
            type: object
            properties:
              code:
                type: string
                description: Error code
                example: '5063'
              message:
                type: string
                description: Error message
                example: Unable to get trip detail
            description: Business error result object
      description: Error response object
    GenericOkResponse:
      required:
        - referenceId
      type: object
      properties:
        referenceId:
          type: string
          description: Reference identification code
          example: BSS-1615326528285
      description: Ok response object
    GetXbotDetailsAndDebtAndListStatus:
      description: JSON schema for GetXboxDetailsAndDebtAndListStatus
      type: object
      properties:
        xbot:
          description: Token identification code (backoffice token)
          example: f440d511-79ef-45d4-8a48-8e771146a145
          type: string
        mediumType:
          type: string
          description: |-
            Type of the medium. List of supported media is project specific.

            <p>
            For TERA projects:
            <ul>
            <li>EMV</li>
            <li>GemaltoPure</li>
            <li>MasterCardWL</li>
            <li>OVC</li>
            <li>Cibo</li>
            <li>GBO</li>
            <li>EMV-CLT</li>
            </ul>
            </p>

            <p hidden>
            tera=[EMV,GemaltoPure,MasterCardWL,OVC,Cibo,GBO,EMV-CLT]
            </p>

            <p>
            For ABTnano projects:
            <ul>
            <li>EMV</li>
            <li>Cibo</li>
            <li>SwissPass</li>
            <li>Barcode</li>
            <li>EMV-CLT</li>
            <li>QRCode</li>
            </ul>
            </p>

            <p hidden>
            nano=[EMV,Cibo,SwissPass,Barcode,EMV-CLT,QRCode]
            </p>
          example: EMV
        trueTokenId:
          type: string
          description: True token value.
          nullable: true
          example: '4012888888881881'
        engravedId:
          type: string
          description: Token physically engraved on the medium.
          nullable: true
          example: '4012888888881881'
        serviceToken:
          type: string
          description: Service token assigned to the medium.
          nullable: true
          example: 8bZxy-Zy6Ey-S5gN2
        formFactor:
          type: string
          description: 'Form of the media (e.g.: ring, watch ...).'
          nullable: true
        status:
          type: string
          description: |-
            Status of the medium.
            <p>
            Possible values:
            <ul>
            <li>OnStock</li>
            <li>RenewedActive</li>
            <li>Active</li>
            <li>Suspended</li>
            <li>Retired</li>
            </ul>
            </p>
          nullable: true
        activationCode:
          type: string
          description: Medium activation code.
          nullable: true
        reason:
          type: string
          description: |-
            The reason of the status change.
            <p>
            Possible values:
            <ul>
            <li>NotAvailable</li>
            <li>CardLost</li>
            <li>CardStolen</li>
            <li>CardBroken</li>
            <li>CardFound</li>
            <li>FraudDetected</li>
            <li>CardBound</li>
            <li>Replaced</li>
            <li>CardImported</li>
            <li>AutoCreated</li>
            <li>CardActivated</li>
            <li>CardUnblocked</li>
            <li>Expired</li>
            <li>Registered</li>
            <li>Anonymized</li>
            <li>ProvisionalNotUsed</li>
            <li>PaymentCoverage</li>
            <li>BoundByIban</li>
            </ul>
            </p>
          nullable: true
        externalUUID:
          type: string
          description: External unique identifier.
          nullable: true
        testFlag:
          type: boolean
          description: Test Flag
          nullable: true
        replacesXBot:
          type: string
          description: External BOT assigned to medium replaced by current instance.
          format: uuid
          nullable: true
          example: d99def09-0309-4099-890e-bbd38327a8dd
        expirationDate:
          type: string
          description: >-
            Date-time until when the medium is valid, format yyyy-MM-ddTHH:mm:sszzz.
          format: date-time
          nullable: true
        propertyBag:
          $ref: '#/components/schemas/PropertyBag'
        debt:
          description: The total value od the debt in cents
          example: 120
          type: integer
        trips:
          description: List of trips the debt is related to
          type: array
          items:
            $ref: '#/components/schemas/Trip'
        allowListed:
          description: Determines whether xbot is present on allow list
          example: true
          type: boolean
        denyListed:
          description: Determines whether xbot is present deny list
          example: false
          type: boolean
    IbanRequest:
      required:
        - iban
        - csn
      type: object
      properties:
        iban:
          type: string
          description: International Bank Account Number
        csn:
          type: number
          description: card sequence number
    ListStatusValue:
      enum:
        - 'No'
        - 'Yes'
      type: string
    ManualTap:
      required:
        - xbot
        - counterpartTransactionId
        - deviceClassId
        - deviceId
        - stopId
      type: object
      properties:
        counterpartTransactionId:
          type: string
          description: Id of the transaction that is missing its pair
          example: '1236589547'
        xbot:
          type: string
          description: Token identification code (external backoffice token)
          example: '12272277752953521453'
        stopId:
          type: string
          description: Id of the location of the tap
          example: '123'
        deviceId:
          type: string
          description: Id of the device
          example: '5415236'
        deviceClassId:
          type: string
          description: Class Id of the device
          example: '54'
        transactionTimestamp:
          type: string
          description: Timestamp of the transaction
          format: date-time
          example: '2019-11-25T17:39:45.000Z'
        entryExitType:
          type: string
          description: 'Direction of the tap: in or out'
          example: ENTRY
          enum:
            - UNKNOWN
            - ENTRY
            - EXIT
      description: JSON schema for ManualTap message
    MediumStatusResponse:
      required:
        - xbot
        - card
        - debt
        - paymentCoverage
        - mediumStatus
        - mediumType
        - listStatus
      type: object
      properties:
        xbot:
          description: 'External BackOffice Token, used for identification of medium.'
          type: string
        card:
          description: >-
            latest medium status and latest medium update as a reason affecting medium status
          type: object
          properties:
            status:
              $ref: '#/components/schemas/Status'
            reason:
              $ref: '#/components/schemas/Reason'
        debt:
          description: debt status and reason for this debt
          type: object
          properties:
            status:
              $ref: '#/components/schemas/CardDebtStatus'
            reason:
              $ref: '#/components/schemas/CardDebtReason'
        paymentCoverage:
          description: payment status and reason
          type: object
          properties:
            reason:
              $ref: '#/components/schemas/PaymentCoverageReason'
            status:
              $ref: '#/components/schemas/PaymentCoverageStatus'
        mediumStatus:
          description: >-
            status of the medium, can be one of: NotAvailable, OnStock, Active, RenewedActive, Suspended or Retired
          type: string
        mediumType:
          description: >-
            type of the medium, can be one of: EMV, GemaltoPure, MasterCardWL, BarcodeSingleUseVoucher, BarcodeDayPass
          type: string
        lastStateChange:
          description: >-
            date in format yyyy-MM-dd'T'HH:mm:ss.SSSXXX. This parameter is optional, is not returned for unknown medium.
          type: string
        travelRegime:
          allOf:
            - $ref: '#/components/schemas/TravelRegime'
            - description: >-
                travel regime of media, can be one of: OpenLoop, ClosedLoop. This parameter is optional, is not returned for unknown medium.
        listStatus:
          description: >-
            status, whether the medium is on allow list (white list) and/or deny list (black list)
          type: object
          properties:
            isOnAllowList:
              $ref: '#/components/schemas/ListStatusValue'
            isOnDenyList:
              $ref: '#/components/schemas/ListStatusValue'
    PaymentCoverageReason:
      enum:
        - NotAvailable
        - PaymentCovered
        - PaymentNotCovered
      type: string
    PaymentCoverageStatus:
      enum:
        - NotAvailable
        - PaymentCovered
        - PaymentNotCovered
      type: string
    PaymentMethodTemplateParamItem:
      required:
        - paymentMethodId
      type: object
      properties:
        paymentMethodId:
          type: string
          description: Payment method identifier
          format: uuid
          example: d23ea548-1a33-4880-9dce-c02c18f90c73
        externalAccountId:
          type: string
          description: External Account Id of the payment method.
          example: PAY_7f2a99a3-aec7-4d75-8586-bdf20dc8d6af
        status:
          type: string
          description: 'Status of Payment method (allowed values - Active, Suspended)'
          example: Active
        billingCycle:
          type: object
          description: Attributes of billing cycle.
          nullable: true
          example:
            minimalDueAmount: 50
            forcePaymentAfterPeriods: 1
            paymentExecutionDateDelayInDays: 10
            dueDateDelayInDays: 15
            recurrence:
              period: MONTHLY
              every: 2
      description: Parameters needed for creation of PaymentMethods from template.
    Reason:
      enum:
        - AutoCreated
        - CardActivated
        - CardBound
        - CardBroken
        - CardFound
        - CardImported
        - CardLost
        - CardStolen
        - CardUnblocked
        - FraudDetected
        - NotAvailable
        - Replaced
      type: string
    RegisterMediumRequest:
      type: object
      properties:
        xbot:
          type: string
          description: External BackOffice Token
          example: '194358869743012'
        mediumType:
          type: string
          description: |-
            Type of the medium. List of supported media is project specific.

            <p>
            For TERA projects:
            <ul>
            <li>EMV</li>
            <li>GemaltoPure</li>
            <li>MasterCardWL</li>
            <li>OVC</li>
            <li>Cibo</li>
            <li>GBO</li>
            </ul>
            </p>

            <p hidden>
            tera=[EMV,GemaltoPure,MasterCardWL,OVC,Cibo,GBO]
            </p>

            <p>
            For ABTnano projects:
            <ul>
            <li>EMV</li>
            <li>Cibo</li>
            <li>SwissPass</li>
            <li>Barcode</li>
            </ul>
            </p>

            <p hidden>
            nano=[EMV,Cibo,SwissPass,Barcode]
            </p>
          example: EMV
        trueTokenId:
          type: string
          description: True token value.
          example: '4012888888881881'
        engravedId:
          type: string
          description: Token physically engraved on the medium.
          example: '4012888888881881'
        formFactor:
          type: string
          description: 'The form of medium (card, ring, apple watch,...).'
          example: phone
        status:
          type: string
          description: >-
            Status of the medium. Can be OnStock for import operation and Active or Suspended for register operation.
          example: Active
        activationCode:
          type: string
          description: Code for activation.
          example: '4536812421897'
        propertyBag:
          $ref: '#/components/schemas/PropertyBag'
        templateParams:
          $ref: '#/components/schemas/TemplateParams'
        expirationDate:
          type: string
          description: >-
            Date-time until when the medium is valid, format yyyy-MM-ddTHH:mm:sszzz or yyyy-MM
          nullable: true
          example: '2022-05-20T06:00:00+02:00'
        maskedCardNumber:
          type: string
          description: >-
            Card number masked with mask defined for EMV bank cards (in TokenVault).
          example: 533*************1232
        bin:
          type: string
          description: >-
            BIN representing the bank card (usually the first 6 digits of card number).
          example: '533406'
        issuerCountryCode:
          type: string
          description: >-
            Code of the country that issued the card (represented as numeric string consisting of 3 digits).
          example: '132'
        testFlag:
          type: boolean
          description: 'data for testing '
          example: false
    RenewMediumRequest:
      required:
        - xBot
      type: object
      properties:
        xBot:
          type: string
          description: >-
            Medium (identified by xBOT) that renews the medium identified in URI by xBOT.
          example: c7dfcdd6-9350-448f-9d34-84a09bafc71b
        xbot:
          type: string
    ReplaceMediumRequest:
      required:
        - xbot
      type: object
      properties:
        xbot:
          type: string
          description: >-
            Medium (identified by xBOT) that replaces the medium identified in URI by xBOT.
          example: c7dfcdd6-9350-448f-9d34-84a09bafc71b
        reason:
          type: string
          description: >-
            The reason why the medium was replaced. Allowed values: 'CardLost', 'CardStolen', 'CardBroken'.
          example: CardStolen
          enum:
            - NotAvailable
            - CardLost
            - CardStolen
            - CardBroken
            - CardFound
            - FraudDetected
            - CardBound
            - Replaced
            - CardImported
            - AutoCreated
            - CardActivated
            - CardUnblocked
            - Expired
            - Registered
            - Anonymized
            - ProvisionalNotUsed
            - PaymentCoverage
            - BoundByIban
          default: Replaced
    RiskListStatus:
      required:
        - riskListType
        - riskListIssuingScheme
        - status
      type: object
      description: >-
        The RisktListStatus IS A data set THAT states the presence of the Token on the Risk Lists.
      properties:
        riskListType:
          type: string
          description: >-
            The riskListType IS AN enumeration THAT identifies the kind of Riks List.
          enum:
            - issuerRiskList
            - tokenRiskList
        riskListIssuingScheme:
          type: string
          description: >-
            The riskListIssuingScheme IS AN enumeration THAT describes the type of EMV Scheme of the Token.
          enum:
            - emv
            - emvClt
        status:
          type: string
          description: >-
            The status IS AN enumeration THAT describes the action to be performed on the Token when verified against the Risk List.
          enum:
            - allow
            - conditionalAllow
            - deny
            - toBlock
        reason:
          type: string
          description: >-
            The reason IS AN enumeration THAT details the reason for a TOken to appear on the Risk List.
          enum:
            - badDebt
            - cardReportedLostOrStolen
    StableTokenResponse:
      type: object
