    RefundSalesPackageRequest:
      required:
        - refundChannelType
        - refundReason
        - refundTimestamp
        - refundBookingId
        - refundedSalesPackage
      type: object
      properties:
        refundChannelType:
          type: string
          description: >-
            Identifies the refund channel (e.g. webshop), related to a particular retailer.
        refundTimestamp:
          type: string
          description: >-
            Timestamp of the refund moment in ISO 8601 format (yyyy-MM-ddTHH:mm:ssTZD). If the refund request is sent with timestamp in the future (later than configured amount of minutes) the refund is scheduled and not done immediately. When the scheduled time comes the refund is performed (in TM, CHS, events are sent, retailer feedback is saved, ...) Notice: This timestamp must be the same as refund timestamps of all refunded products! Notice2: In v2 version of refund endpoint is scheduling not supported, so the refund is always done immediately (in TM DB, CHS, events are sent, retailer feedback is saved, ...)
          format: date-time
        refundReason:
          type: string
          description: Reason for requested refund.
        refundBookingId:
          type: string
          description: Identifier of refund booking transaction.
        refundServiceReferenceId:
          type: string
          description: The service reference ID of refund sales packake transaction.
          nullable: true
        refundedSalesPackage:
          $ref: '#/components/schemas/RefundedSalesPackage'
    RefundedProduct:
      required:
        - itemRefundAmount
        - refundTimestamp
        - xpit
      type: object
      properties:
        itemRefundAmount:
          $ref: '#/components/schemas/MonetaryAmountWithVAT'
        xpit:
          type: string
          description: External product instance token.
          format: uuid
          example: 5d6a84a8-31b0-4be0-9ae8-b254b7abf869
        refundTimestamp:
          type: string
          description: >-
            Timestamp of the refund moment in ISO 8601 format (yyyy-MM-ddTHH:mm:ssTZD). If the refund request is sent with timestamp in the future (later than configured amount of minutes)


             refund is scheduled and not done immediately. When the scheduled time comes the refund is performed (in TM, CHS, events are sent, retailer feedback is saved, ...) Notice:
             This timestamp must be the same as refund timestamps of the request!
             Notice2: In v2 version of refund endpoint is scheduling not supported, so the refund is always done immediately (in TM DB, CHS, events are sent, retailer feedback is saved, ...)
          format: date-time
          example: '2021-07-05T09:41:03Z'
      description: 1-N products to be refunded.
    RefundedSalesPackage:
      required:
        - packageRefundAmount
        - products
        - xspit
      type: object
      properties:
        xspit:
          type: string
          description: External sales package instance token.
          format: uuid
          example: 4b4a9121-fb93-4aef-99f1-1268bce9f9b6
        packageRefundAmount:
          $ref: '#/components/schemas/MonetaryAmount'
        products:
          type: array
          description: 1-N products to be refunded.
          items:
            $ref: '#/components/schemas/RefundedProduct'
      description: Sales package to be refunded.
