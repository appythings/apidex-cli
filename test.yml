          type: string
          description: A stopId IS A unique identifier THAT distinguishes a Tariff Location from all other Tariff Locations
        transactionReference:
          type: string
          description: A transactionReference IS AN unique identifier THAT is assigned by the callee
          example: a0bc0387-bb0c-4d0e-9b4b-50aa32d5d0cb
