        networkId:
          minimum: 0
          type: integer
          description: Id of the network
        networkName:
          type: string
          description: Name of the network
        degradedFareMode:
          type: string
          description: Means of degraded fare
          enum:
            - UNDEFINED
            - NORMAL
            - TMO
            - EEO
            - INCIDENT
            - DISRUPTION
        relations:
          type: array
