    BindPaymentMethodProviderRequest:
      required:
        - paymentMethodId
      type: object
      properties:
        paymentMethodId:
          type: string
          description: Payment method provider ID.
          format: uuid
          example: 66d7e618-f4c6-4f5b-bfe0-74373e465e5b
        status:
          type: string
          description: >-
            Status of created payment method instance. Can be Active or Suspended.
          default: Active
        externalAccountId:
          type: string
          description: External account ID (e.g. Paypall account ID).
          nullable: true
        billingCycle:
          type: object
          description: >-
            JSon representing the properties of billing cycle. The structure of JSON is not check (it must be just correct JSON).
          example:
            minimalDueAmount: 50
            forcePaymentAfterPeriods: 1
            paymentExecutionDateDelayInDays: 10
            dueDateDelayInDays: 15
            recurrence:
              period: MONTHLY
              every: 2
        fundingSourceId:
          type: string
          description: >-
            Unique identifier of Funding Source in the Customer account management.
          example: cc379c62-2715-483a-ac6f-d7c2fdf90bdc
        order:
          type: integer
          description: >-
            The attribute order indicates the order among other payment methods assigned to this transit account. It starts with 1 (e.i. 0 is not used.) Payment method with order 1 will be used for payment (if it is active). The payment method is inserted to the position indicated by order attribute and other payment methods are shifted. If order is set to value less than 1, it will be changed to 1. If it is set to the number greater than count of bound Payment methods, it is inserted to the end of payment methods and the order is set correctly.
          default: 1
          nullable: true
        contractStartDate:
          type: string
          description: >-
            Date (format YYYY-MM-DD) when the contract should be started. If the date is the current date, the payment method is immediately activated (or suspended - if the status is set to Suspended in request) If the date is in the future, the activation is scheduled and the payment method is not active yet. If the date is in the past, the error response is returned. If the value is not set, the current date is set. Note: Contract attributes are intended for payment methods for which can be only one active payment method (of that payment method mode) at any moment.
          nullable: true
          example: '2022-04-02'
        minimalContractEndDateInclusive:
          type: string
          description: >-
            Date (format YYYY-MM-DD) until when the contract cannot be terminated by take-over by another PSP. Another contract (of the same type) can be started one day after this date. Note: Contract attributes are intended for payment methods for which can be only one active payment method (of that payment method mode) at any moment.
          nullable: true
          example: '2024-04-02'
        contractEndDateInclusive:
          type: string
          description: >-
            Date (format YYYY-MM-DD) when the contract should be terminated. The day after this date this payment method cannot be used anymore (status = Terminated - final state).
          nullable: true
          example: '2025-04-02'
    ExternalAccountIdentifier:
      type: object
