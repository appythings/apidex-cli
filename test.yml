          description: A deviceId IS AN unique identifier THAT distinguishes one Device from all other Devices
        deviceSubId:
          type: string
          description: A deviceSubId IS AN identifier THAT is part of optional device configuration
        deviceClassId:
          type: string
          description: A deviceClassId IS AN enumerated identifier THAT describes the type of Device responsible for creating the Transaction
        businessEntityId:
          type: string
          description: >-
            A businessEntityId IS A unique identifier THAT represents a specific Business Entity in the GBO
        additionalAttributes:
          $ref: '#/components/schemas/TransactionAdditionalAttributes'
        createdAt:
          description: >-
            createdAt IS A date, time and time zone indication THAT describes when the Transaction was recorded in the ODS
          type: string
