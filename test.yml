            - FUNICULAR
            - METRO
            - RAIL
            - TROLLEYBUS
            - TRAM
            - WATER
            - CABLEWAY
            - OTHER
        transactionTimestamp:
          type: string
          format: date-time
          description: A transactionTimestamp IS A date, time and time zone indication THAT describes when the Transaction was created either by a Device or callee
        transactionBusinessDate:
          type: string
          format: date
          description: Business date of the transaction
        xbot:
          type: string
