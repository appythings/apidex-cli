      required:
        - deploymentId
        - version
        - creationTimestamp
        - status
        - validityStart
        - fingerprint
      type: object
      properties:
        deploymentId:
          description: >-
            Unique identifier of the deployed tariff or fragment, assigned at the time of the deployment.
          type: string
          nullable: false
        version:
          description: Version of the standalone tariff or fragment.
          type: string
          nullable: false
        fragmentId:
          description: >-
            Identifier of the fragment, applicable only in case of fragmented deployment.
          type: string
        creationTimestamp:
          format: date-time
          description: Timestamp when the tariff or fragment has been deployed.
          type: string
        status:
          allOf:
            - $ref: '#/components/schemas/DeploymentStatus'
            - description: >-
                Deployment status of the tariff or fragment in the central repository. Use cluster status synchronization endpoints to see the status of its synchronization with all tariff service instances in the cluster.
        metadata:
          allOf:
            - $ref: '#/components/schemas/TariffMetadata'
            - description: >-
                Key-value pair(s) in which the key is the metadata name and the value is either a string or a list of strings (if multiple values can be associated with the key). Used to query for specific fragments by its key content identifiers. All metadata are project specific. Example metadata are typeOfFrame, organisation, operator, network.
        validityStart:
          format: date-time
          description: >-
            Declared validity start of the tariff data. Used to calculate the timeline of active versions over time.
          type: string
          nullable: false
        validityEnd:
          format: date-time
          description: >-
            Optional declared validity end of the tariff data. Used to calculate the timeline of active versions over time.
          type: string
        description:
          description: Textual description of the tariff data provided by its author.
          type: string
        fingerprint:
          description: >-
            Content fingerprint calculated from the tariff data. Value does not change if the same tariff or fragment is repeatedly deployed and undeployed (unlike the deploymentId which is always newly assigned).
          type: string
        runbookId:
          description: Identifier of a runbook associated to the deployment
          type: string
