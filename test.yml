        products:
          type: array
          description: >-
            List of applied products for the whole trip with cumulated appliedValue of internal products used belonging to the sales package.


             Auditing is not supported on this level.
          items:
            $ref: '#/components/schemas/ProductDto'
        checkinTransactionTimestamp:
          type: string
          description: Timestamp of the Check-In
          format: date-time
        checkoutTransactionTimestamp:
          type: string
          description: Timestamp of the Check-Out
          format: date-time
        checkinTransactionReference:
          type: string
          description: Reference to the Check-In transaction
        checkoutTransactionReference:
          type: string
          description: Reference to the Check-Out transaction
        checkinLocation:
          $ref: '#/components/schemas/StopDto'
        checkoutLocation:
          $ref: '#/components/schemas/StopDto'
        inst:
          type: string
          description: Temporar inspection token
          format: uuid
        tokenType:
          type: string
          description: Type of the token
        tokenNumber:
          type: string
          description: Number of the token (RFU)
        tokenNickname:
          type: string
          description: Nickname of the token (RFU)
        transportType:
          type: string
          description: 'Enum, which defines the type of the transport'
          enum:
            - AIR
            - BUS
            - COACH
            - FUNICULAR
            - METRO
            - RAIL
            - TROLLEYBUS
            - TRAM
            - WATER
            - CABLEWAY
            - OTHER
        lineId:
          type: string
          description: >-
            Line identification code. In some networks (e.g. rail) is not available
        lineName:
          type: string
          description: Name of the line
        networkId:
          type: string
          description: >-
            Identifier of the network a validator is part of, optional for on-board and handheld validators
        networkName:
          type: string
          description: Name of the network
        currency:
          type: string
          description: Currency in currency code (ISO 4217)
        transportIcon:
          type: string
          description: Relative URL to the corresponding icon of the means of transport
        legs:
          type: array
          description: List of legs
          items:
            $ref: '#/components/schemas/LegDto'
        lastUpdatedTripDateTime:
          type: string
          description: Timestamp the last update of the trip
          format: date-time
        fare:
          type: integer
          description: >-
            Total fare value from product assignments, in eurocents, to be deducted from the cardholder's account
          format: int64
        loyaltyOrDiscount:
          type: boolean
          description: >-
            Loyalty of discount flag. True if some discount product was applied. (fare is lower than baseRate)
        supportCode:
          type: string
          description: Support code reference in CRM system
        tripVersionReason:
          type: string
          description: >-
            Enum, which defines the reason of the version of the trip. "NEW" - New trip, "FARE" - Fare has changed for the trip, "PROPERTY" - Some property of the trip has changed, "STRUCTURE" - Structure of the trip has changed, "OUTDATED" - The trip was outdated, "RECALCULATE" - The trip was recalculated due to tariff change
          enum:
            - NEW
            - FARE
            - PROPERTY
            - STRUCTURE
            - OUTDATED
            - RECALCULATE
        nature:
          type: string
          description: >-
            Enum, which defines the nature of the trip. \"ACCESS_DENIED\" - Access for passenger through the gate is denied, \"SAME_LOCATION_EXIT\" - Passenger checks-out at the same location as checked-in, \"OTHERS_RIDE\" - for the PTOs where the wrong check-out was done (aka invalid), \"OTHERS_TAPS\" - for PTOs to know that other TAP was done on the different network (aka autocorrected), \"OTHERS_LEGS\" - for future (shared) trips. Trip will contain transaction taps from both PTOs with synthetic taps somewhere in between
          enum:
            - ACCESS_DENIED
            - SAME_LOCATION_EXIT
            - OTHERS_RIDE
            - OTHERS_TAPS
            - OTHERS_LEGS
        payments:
          type: array
          description: List of payments - if embed payments is allowed
          items:
            $ref: '#/components/schemas/PaymentDto'
        checkinTransactionId:
          type: string
          description: ID of the Check-In transaction
        checkoutTransactionId:
          type: string
          description: ID of the Check-Out transaction
        transportSubType:
          type: string
          description: Subtype of the tansport (e.g. local bus)
        tariffVersionId:
          type: string
          description: Id of the used tariff version
        correlationId:
          type: string
          description: ID that links trip audit data
        auditing:
          type: object
          properties: {}
          description: Trip auditing data - if embed auditing is allowed
        settlements:
          type: array
          description: List of settlements - if embed settlement is allowed
          items:
            $ref: '#/components/schemas/TripSettlementDto'
        createdAt:
          type: string
          description: >-
            Datetime with ms part, when trip was received by Notification processor
        entryTariffLocation:
          $ref: '#/components/schemas/StopDto'
        traveledLines:
          type: array
          description: List of lines used along the ride in case of interlining
          items:
            $ref: '#/components/schemas/LineDto'
        tripStartTxnId:
          type: integer
          description: >-
            Trip CKI transaction identifier. Contains value of the CKI backOfficeTxnId attribute
          format: int64
        tripEndTxnId:
          type: integer
          description: >-
            Trip CKO transaction identifier. Contains value of the CKO backOfficeTxnId attribute
          format: int64
        numberOfSyntheticLegs:
          type: integer
          description: >-
            Number of real PTO trip segments (legs) travelled between CKI and CKO
          format: int64
        numberOfSyntheticTrips:
          type: integer
          description: Number of trips at real PTOs made between CKI and CKO
          format: int64
