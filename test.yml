    ExternalPassengerAccountResponse:
      type: object
      properties:
        status:
          type: string
          example: ACTIVE
          enum:
            - ACTIVE
          description: >-
            Status of the Passenger Account. Reserved for future use. At the moment only possible value is ACTIVE.
        externalAccountId:
          type: string
          minLength: 1
          maxLength: 128
          example: b3296c44-2d7e-42c0-9f86-1a4ee029f00b
          description: >-
            The value of <i>externalAccountId</i> parameter as specified during passenger account creation.


            Parameter was originally intended for storing of identifier that serves as a link to other system.

            For example if CRM system creates new passanger account in IDBT system, it can store here ID of passenger account in CRM.

            This way a caller might link his own passenger account representation with IDBT passenger account.
        externalTransitAccounts:
          type: array
          items:
            $ref: '#/components/schemas/ExternalTransitAccount'
    ExternalTransitAccount:
      type: object
      properties:
        xtat:
          type: string
          description: >-
            External transit account token (xTAT). Uniquely identifies the associated transit account.
          format: uuid
          example: 1919be43-5c1c-4472-9a49-4886f97f733b
      description: >-
        List of transit accounts assigned to the requested passenger account.


        Passenger account serves as a grouping of transit accounts. Passenger account groups zero or more transit accounts.
    PatRequest:
      required:
        - externalAccountId
      type: object
      properties:
        externalAccountId:
          type: string
          minLength: 1
          maxLength: 128
          description: >-
            Parameter was originally intended for storing of identifier that serves as a link to other system.

            For example if CRM system is creating new passanger account in IDBT system, it can store here ID of passenger account in CRM.

            This way a caller might link his own passenger account representation with IDBT passenger account.

            This parameter is not interpreted by IDBT system in any way. Basically a caller can store arbitrary string here (e.g. "N/A").

            This attribute of passenger account does not have to be unique and can be updated afterwards.
          example: 7aecc75e-14c1-4ef2-9156-de838d0573b7
    TranslationResponse:
      type: object
      description: Object containing identifier value and its type.
      properties:
        value:
          type: string
          description: Identifier value.
          example: 64d7265e-42ce-4ccc-addd-3e95056b757d
        type:
          type: string
          description: Identifier type.
          enum:
            - xbot
            - xtat
            - xpmit
            - xpit
            - serviceToken
            - eid
            - ttid
            - xprofit
            - xpat
            - xspit
            - inst
            - alit
            - opaque_payment_card
    AlternativeText:
      type: object
      description: AN AlternativeText IS AN object THAT contains values to enable one or more language translations
      properties:
        text:
          type: object
          description: A text is AN wrapper THAT is used as an abstraction layer to contain the properties of AlternativeText
          properties:
            lang:
              type: string
              description: A lang IS AN enumerated identifier THAT describes the language of the text within the AlternativeText object
              example: en-US
            textIdType:
              type: string
              description: A textIdType IS AN name THAT is used to categorize types of text
              example: publicName
            text:
              type: string
              description: A text IS A name THAT has been translated to a particular language
              example: Default Travel Entitlement
    CreateTatRequest:
      type: object
      properties:
        templateName:
          type: string
          description: >-
            The name of transit account template, that should be used for implicit product and payment methods creation. This template must be configured in the database.
          example: default
        mediumType:
          type: string
          description: >-
            The type of medium that will be later bound to this transit account. It determines the transit account template, that should be used for implicit product and payment methods creation. This template must be configured in the database. If the templateName is set, this parameter is not taken into consideration.
          example: MifareUltralight
    ExternalMedium:
      type: object
      properties:
        mediumType:
          type: string
          description: |-
            Type of the medium. List of supported media is project specific.

            <p>
            For TERA projects:
            <ul>
            <li>EMV</li>
            <li>GemaltoPure</li>
            <li>MasterCardWL</li>
            <li>OVC</li>
            <li>Cibo</li>
            <li>GBO</li>
            <li>EMV-CLT</li>
            </ul>
            </p>

            <p hidden>
            tera=[EMV,GemaltoPure,MasterCardWL,OVC,Cibo,GBO,EMV-CLT]
            </p>

            <p>
            For ABTnano projects:
            <ul>
            <li>EMV</li>
            <li>Cibo</li>
            <li>SwissPass</li>
            <li>Barcode</li>
            <li>EMV-CLT</li>
            <li>QRCode</li>
            </ul>
            </p>

            <p hidden>
            nano=[EMV,Cibo,SwissPass,Barcode,EMV-CLT,QRCode]
            </p>
          example: EMV
        trueTokenId:
          type: string
          description: True token value.
          nullable: true
          example: '4012888888881881'
        engravedId:
          type: string
          description: Token physically engraved on the medium.
          nullable: true
          example: '4012888888881881'
        serviceToken:
          type: string
          description: Service token assigned to the medium.
          nullable: true
          example: 8bZxy-Zy6Ey-S5gN2
        formFactor:
          type: string
          description: 'Form of the media (e.g.: ring, watch ...).'
          nullable: true
        status:
          type: string
          description: |-
            Status of the medium.
            <p>
            Possible values:
            <ul>
            <li>OnStock</li>
            <li>RenewedActive</li>
            <li>Active</li>
            <li>Suspended</li>
            <li>Retired</li>
            </ul>
            </p>
          nullable: true
        activationCode:
          type: string
          description: Medium activation code.
          nullable: true
        reason:
          type: string
          description: |-
            The reason of the status change.
            <p>
            Possible values:
            <ul>
            <li>NotAvailable</li>
            <li>CardLost</li>
            <li>CardStolen</li>
            <li>CardBroken</li>
            <li>CardFound</li>
            <li>FraudDetected</li>
            <li>CardBound</li>
            <li>Replaced</li>
            <li>CardImported</li>
            <li>AutoCreated</li>
            <li>CardActivated</li>
            <li>CardUnblocked</li>
            <li>Expired</li>
            <li>Registered</li>
            <li>Anonymized</li>
            <li>ProvisionalNotUsed</li>
            <li>PaymentCoverage</li>
            <li>BoundByIban</li>
            </ul>
            </p>
          nullable: true
        externalUUID:
          type: string
          description: External unique identifier.
          nullable: true
        testFlag:
          type: boolean
          description: Test Flag
          nullable: true
        replacesXBot:
          type: string
          description: External BOT assigned to medium replaced by current instance.
          format: uuid
          nullable: true
          example: d99def09-0309-4099-890e-bbd38327a8dd
        expirationDate:
          type: string
          description: >-
            Date-time until when the medium is valid, format yyyy-MM-ddTHH:mm:sszzz.
          format: date-time
          nullable: true
        propertyBag:
          $ref: '#/components/schemas/PropertyBag'
        xbot:
          type: string
          description: External BOT.
          format: uuid
          example: 1919be43-5c1c-4472-9a49-4886f97f733b
    ExternalPaymentMethodInstance:
      type: object
      properties:
        paymentMethodId:
          type: string
          description: Id of the payment method provider this instance is linked to.
          format: uuid
          example: dba0b896-118d-4e9e-abf5-af264ced34c4
        paymentMethodMode:
          type: string
          description: Mode of the payment method provider this instance is linked to.
          example: Payment_method_provider_mode
        status:
          type: string
          description: Status of the payment method instance.
          example: Active
        externalAccountId:
          type: string
          description: External account ID (e.g. Paypall account ID).
          nullable: true
        fundingSourceId:
          type: string
          description: >-
            Unique identifier of funding source in the Customer account management.
          nullable: true
          example: '4012888888881881'
        fundingSource:
          type: object
          description: >-
            Attributes of funding source as received from Customer Account Management.
          nullable: true
          properties:
            uuid:
              type: string
              description: Id of the funding source in the Customer Account Management.
              format: uuid
              example: dba0b896-118d-4e9e-abf5-af264ced34c4
            type:
              type: string
              description: Type of the funding source.
              example: SEPA
            status:
              type: string
              description: Status of the funding source.
              example: ACTIVE
            displayText:
              type: string
              description: The text that should be displayed for this funding source.
              example: DE893704**********3123
            tokenExpiry:
              type: string
              description: The expiration date of token.
              format: YYYY-MM-DD
              example: '2025-12-31'
            tokenIssuer:
              type: string
              description: The issuer of the funding source.
              example: ABT
            token:
              type: string
              description: Token of the funding source.
              example: '1481568747703112636'
            mandateRef:
              type: string
              description: MAndate reference of the funding source.
              example: FHSDJKLIUERT69384DSKV
            signatureDate:
              type: string
              description: The date of signature.
              format: YYYY-MM-DD
              example: '2022-04-30'
            recurrence:
              type: string
              description: The recurence of funding.
              example: ONE_OFF
            cardBrand:
              type: string
              description: The brand of the card.
              example: VISA
            additionalPayload:
              type: array
              description: List of objects containing key and value.
              example:
                - key: creditorName
                  value: Diergaarde Blijdorp
                - key: creditorIdentifier
                  value: NL002772036B01
                - key: creditorAddress
                  value: Blijdorplaan 8
                - key: creditorPostalCode
                  value: 3041JG
                - key: creditorCity
                  value: Rotterdam
                - key: creditorCountry
                  value: Nederland
              items:
                $ref: '#/components/schemas/PropertyBagItem'
        billingCycle:
          type: object
          description: Attributes of billing cycle.
          nullable: true
          example:
            minimalDueAmount: 50
            forcePaymentAfterPeriods: 1
            paymentExecutionDateDelayInDays: 10
            dueDateDelayInDays: 15
            recurrence:
              period: MONTHLY
              every: 2
        currentBalance:
          type: integer
          description: Current balance. It is set for example for stored value wallet.
          nullable: true
          format: int32
        currency:
          type: string
          description: Currency of current balance.
          nullable: true
          example: EUR
        paymentProviderName:
          type: string
          description: Name of the payment method provider this instance is linked to.
          example: Payment_method_provider_name
        businessEntityId:
          type: string
          example: '3'
        order:
          type: integer
          description: >-
            Order of the payment method. (For payment will be used Active Payment Method with the smallest order number.)
          format: int32
        contractStartDate:
          type: string
          description: >-
            Date (format YYYY-MM-DD) when the contract was (or will be) started. Note: Contract attributes are intended for payment methods for which can be only one active payment method (of that payment method mode) at any moment.
          nullable: true
          example: '2022-04-02'
        minimalContractEndDateInclusive:
          type: string
          description: >-
            The date (format YYYY-MM-DD) until when the contract cannot be terminated by take-over by another PSP. Another contract (of the same type) can be started one day after this date at the earliest. Note: Contract attributes are intended for payment methods for which can be only one active payment method (of that payment method mode) at any moment.
          nullable: true
          example: '2024-04-02'
        contractEndDateInclusive:
          type: string
          description: >-
            Date (format YYYY-MM-DD) when the contract was ( or will be) terminated. The day after this date this payment method cannot be used anymore (status = Terminated - final state).
          nullable: true
          example: '2025-04-02'
        xpmit:
          type: string
          description: External payment method instance token.
          format: uuid
          example: 5d6a84a8-31b0-4be0-9ae8-b254b7abf869
      description: >-
        Payment methods with external identifiers assigned to the transit account.
    ExternalProfileInstance:
