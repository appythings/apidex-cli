    Stop:
      description: Stop object
      type: object
      properties:
        stopId:
          description: Stop identification number
          example: 14
          type: integer
        stopCode:
          description: Code of the stop (RFU)
          example: '145'
          type: string
        stopName:
          $ref: '#/components/schemas/PropertyBag'
        stopDesc:
          description: Description of the stop
          example: Central Airport Station
          type: string
        stopLat:
          description: Latitude of the stop
          example: 38.8889
          type: number
        stopLon:
          description: Longitude of the stop
          example: 14.58889
          type: number
        stopUrl:
          description: URL of the stop
          example: /icons/stops/stop.svg
          type: string
        locationType:
          description: Type of the location (RFU)
          type: integer
          default: 0
        locationDescription:
          description: Description of the location (RFU)
          example: main location
          type: string
        parentStation:
          description: Parent station (RFU)
          example: 123
          type: integer
    TemplateParams:
      type: object
      properties:
        paymentMethods:
          type: array
          items:
            $ref: '#/components/schemas/PaymentMethodTemplateParamItem'
      description: >-
        Collection of parameters needed for creation of Transit Account together with predefined Payment Methods and Products.
    TransactionMetaData:
      required:
        - businessEntityId
        - deviceClassId
        - deviceId
        - serviceMode
        - transactionReference
        - transactionTimestamp
        - transactionType
      type: object
      properties:
        transactionType:
          type: string
          description: 'Type of transaction, always TAP'
          enum:
            - TAP
        transactionTimestamp:
          type: string
          description: >-
            Timestamp of the transaction as assigned by the device creating the transaction, in UTC
          format: date-time
          example: '2019-11-25T17:39:45.000Z'
        transactionReference:
          type: string
          minLength: 1
          maxLength: 64
          description: Unique reference to this transaction as UUID
        tariffVersionId:
          type: string
          maxLength: 20
          description: EOD version under which the device was operating
        deviceId:
          type: string
          minLength: 1
          maxLength: 20
          description: Decimal representation of deviceId
        deviceClassId:
          type: string
          minLength: 1
          maxLength: 8
          description: First byte of deviceId
        serviceMode:
          type: string
          description: Means of service
          enum:
            - BUS
            - TRAIN
            - METRO
            - TRAM
            - TAXI
            - BOAT_FERRY
            - RETAILER
            - MOBILE
            - CUSTOMER_SUPPORT
            - WEB
            - BACKOFFICE
        businessEntityId:
          minimum: 0
          maximum: 9999999
          type: integer
          description: PTO id
        tariffLocationId:
          type: string
          maxLength: 10
          description: EOD Location number
        geoLocation:
          required:
            - latitude
            - longitude
          type: object
          properties:
            longitude:
              type: number
              description: 'Longitude, rounded half-up to 6 decimal places'
            latitude:
              type: number
              description: 'Latitude, rounded half-up to 6 decimal places'
          description: Geographical location
        agentId:
          type: string
          maxLength: 10
          description: 'Id of operator of device (ie: inspector)'
        shiftId:
          type: string
          maxLength: 10
          description: Shift number of staff or device
        deviceSubId:
          type: string
          maxLength: 20
          description: Optional device configuration
        agentType:
          type: string
          description: >-
            Identifier of the function of the personnel operating a handheld device
          enum:
            - OPERATOR
            - SUPERVISOR
            - INSPECTOR
            - MAINTENANCE
            - CASHCOLLECTOR
            - DRIVER
            - BACKOFFICE
            - TRAINEE
        facilityOperatorId:
          minimum: 0
          maximum: 9999999
          type: integer
          description: >-
            Business entity operating the facility where the transaction was created
      description: Transaction metadata
    TravelRegime:
      enum:
        - ClosedLoop
        - OpenLoop
      type: string
    TripRecalculations:
      description: TripRecalculations object
      type: object
      properties:
        recalculationStartDateTime:
          type: string
          description: >-
            Timestamp of trip recalculations start. If a timestamp is in the middle of a journey, the whole journey needs to be recalculated. If the timestamp is outside of a journey (or in between journeys), only the journey that follows after the timestamp is re-provisioned.
          format: date-time
          example: '2021-07-05T13:00:00+02:00'
    TripRecalculationsOkResponse:
      type: object
      properties:
        tripsUpdatedCount:
          type: number
          description: Number of trips that are marked with versionReason=“RECALCULATE”
          example: 10
      description: TripRecalculations Ok response object
    ValidationTransaction:
      required:
        - authorizationLists
        - authorizationResult
        - idType
        - onboardValidation
        - transactionMetaData
      type: object
      properties:
        transactionMetaData:
          $ref: '#/components/schemas/TransactionMetaData'
        xbot:
          type: string
          minLength: 1
          maxLength: 25
          description: >-
            BackOffice token. Always use only one of "xbot","engravedId","serviceToken","trueTokenId","encryptedTokenData"
        xxbot:
          type: string
          description: >-
            External BackOffice token. Always use only one of "xbot","engravedId","serviceToken","trueTokenId","encryptedTokenData"
        engravedId:
          type: string
          description: >-
            Engraved Id. Always use only one of "xbot","engravedId","serviceToken","trueTokenId","encryptedTokenData"
        serviceToken:
          type: string
          description: >-
            Service token. Always use only one of "xbot","engravedId","serviceToken","trueTokenId","encryptedTokenData"
        trueTokenId:
          type: string
          description: >-
            True token. Always use only one of "xbot","engravedId","serviceToken","trueTokenId","encryptedTokenData"
        encryptedTokenData:
          required:
            - securityMethod
            - securityVersion
            - encryptedData
          type: object
          properties:
            securityMethod:
              type: string
              description: The security method used to encrypt data
              enum:
                - AES
                - DUKPT
            securityVersion:
              type: integer
              minimum: 0
              description: The version of the key used
            encryptedData:
              type: string
              description: >-
                The encrypted token data in HexString format according to selected security method
          description: >-
            EMV data. Can only be used with Id type "1030", "1031" and "1045". Always use only one of "xbot","engravedId","serviceToken","trueTokenId","encryptedTokenData"
        idType:
          minimum: 0
          maximum: 99999
          type: integer
          description: >-
            Media type, "1031" for Gemalto Pure, "1037" for OV Chip Card, "1038" for Cibo, "1040" for GBO, "1045" for EMV-CLT
        vehicleDirectionType:
          type: string
          description: Direction Type
          enum:
            - UNDEFINED
            - INBOUND
            - OUTBOUND
            - NORTHBOUND
            - EASTBOUND
            - SOUTHBOUND
            - WESTBOUND
            - CLOCKWISE
            - COUNTER_CLOCKWISE
        entryExitType:
          type: string
          description: Corresponds to TLS Transaction Type
          enum:
            - UNKNOWN
            - ENTRY
            - EXIT
            - PRELIMINARY_ENTRY
            - PRELIMINARY_EXIT
        servicePatternId:
          type: string
          maxLength: 10
          description: >-
            Route Id from the most recent segment, decimal encoded in string encapsulation
        lineId:
          type: string
          maxLength: 10
          description: >-
            Line Id from the most recent segment, decimal encoded in string encapsulation
        authorizationResult:
          type: string
          description: Result of the authorization
          enum:
            - PERMIT
            - DENY
            - NO_PASS
            - CANCELLED
            - SKIPPED
            - INCOMPLETE
        authorizationLists:
          type: array
          description: Array of authorizationList objects
          items:
            required:
              - listName
              - listSequenceNo
            type: object
            properties:
              listName:
                type: string
                description: Corresponds to listId
              listSequenceNo:
                minimum: 0
                type: integer
                description: 'Sequence number the list was at, at the time of validation'
              listUpdateReceived:
                type: string
                description: >-
                  Timestamp of the update of the list was at, at the time of validation
                format: date-time
                example: '2019-11-25T17:39:45.000Z'
        denialReason:
          type: string
          description: Reason for the denial
          enum:
            - NOT_REGISTERED
            - CARD_EXPIRED
            - CARD_MISUSE
            - ISSUER_NOT_ACCEPTED
            - CARD_NOT_ALLOWED
            - TOKEN_DENIED
            - NO_TAP_FOUND
            - TRAVELING_IN_INVALID_CLASS
            - ANTI_PASSBACK
            - CONSECUTIVE_TAP
            - DEBOUNCE_HANDLING
            - ALREADY_TAPPED
        vehicleId:
          minimum: 0
          maximum: 99999999
          type: integer
          description: Id of the vehicle
        vehicleTripId:
          type: string
          maxLength: 12
          description: Trip Id of the vehicle
        onboardValidation:
          type: boolean
          description: Onboard validation flag
        networkId:
          minimum: 0
          maximum: 999999
          type: integer
          description: Id of the network
        previousLocation:
          type: object
          properties:
            tariffLocationId:
              type: string
              maxLength: 10
              description: EOD Location number
            geoLocation:
              required:
                - latitude
                - longitude
              type: object
              properties:
                longitude:
                  type: number
                  description: 'Longitude, rounded half-up to 6 decimal places'
                latitude:
                  type: number
                  description: 'Latitude, rounded half-up to 6 decimal places'
              description: Geographical location
        degradedFareMode:
          type: string
          description: Means of degraded fare
          enum:
            - UNDEFINED
            - NORMAL
            - TMO
            - EEO
            - INCIDENT
            - DISRUPTION
        mediaTxnSeqNo:
          minimum: 0
          maximum: 9999999999
          type: integer
          format: int64
          description: >-
            Transaction sequence number as generated by the media, mandatory for EMV
        relations:
          type: array
          description: Relation between transactions
          items:
            required:
              - relationType
              - transactionReference
            type: object
            properties:
              transactionReference:
                type: string
                minLength: 1
                maxLength: 64
                description: Reference to another transaction
              relationType:
                type: string
                description: >-
                  The relation the referenced transaction has with this transaction
                enum:
                  - UNKNOWN
                  - ENTRY
                  - EXIT
                  - PRELIMINARY_ENTRY
                  - PRELIMINARY_EXIT
        routeSegments:
          type: array
          description: Ordered list of RouteSegments
          items:
            required:
              - lineId
            type: object
            properties:
              lineId:
                type: string
                minLength: 1
                maxLength: 10
                description: 'Identifier of a line, decimal in string encapsulation'
              linePublicNbr:
                type: string
                description: Public identifier of a line
              servicePatternId:
                type: string
                maxLength: 10
                description: Public identifier of a route
              tripId:
                type: string
                maxLength: 10
                description: >-
                  Trip from a vehicle perspective, decimal in string encapsulation
              tripPublicNbr:
                type: string
                description: Trip as displayed to the public
              tripType:
                type: string
                description: Type of the trip
                enum:
                  - UNDEFINED
                  - COMMERCIAL
                  - NONCOMMERCIAL
              tripDepartTime:
                type: string
                description: Depart timestamp of the trip
              tripDirection:
                type: string
                description: Direction of the trip
                enum:
                  - UNDEFINED
                  - INBOUND
                  - OUTBOUND
                  - NORTHBOUND
                  - EASTBOUND
                  - SOUTHBOUND
                  - WESTBOUND
                  - CLOCKWISE
                  - COUNTER_CLOCKWISE
              from:
                type: string
                maxLength: 10
                description: Corresponds to a tariffLocationId where the segment started
              to:
                type: string
                maxLength: 10
                description: >-
                  Corresponds to a tariffLocationId where the segment ended. If this segment is the current segment, this is equal to the tariffLocationId in the TransactionMetadata
              distanceCovered:
                minimum: 0
                type: integer
                description: 'Distance covered in this segment, in meters'
              zonesCrossed:
                minimum: 0
                type: integer
                description: Number of zones crossed
              concession:
                type: string
                description: Identifier of the PTO concession the segment belongs to
              passengerClass:
                type: string
                description: Class of travel
                enum:
                  - UNDEFINED
                  - FIRST
                  - SECOND
                  - SERVICE_PROVIDER
    AccountBalanceDto:
      type: object
      description: AN AccountBalance IS A state THAT describes the difference between the amount created and consumed
      properties:
        balanceReferenceId:
          type: string
          description: A balanceReferenceId IS A unique identifier THAT distinguishes this Account Balance from all other Account Balances
        originalPaymentReference:
          type: string
          description: AN originalPaymentReference IS A unique identifier THAT refers to the original Payment
        createSettlementDate:
          type: string
          description: A createSettlementDate IS A date THAT describes when this Account Balance was created
        createReasonCode:
          type: string
          description: A createReasonCode IS AN enumerated identifier THAT describes the reason why this Account Balance was created
        instantiationAmount:
          type: integer
          description: AN instantiationAmount IS AN amount in cents THAT describes the monetary value of the Account Balance when created
          format: int64
        amountChanged:
          type: integer
          description: AN amountChanged IS AN amount in cents THAT describes the difference between the amount created by a correction or consumed by subsequent Trips
          format: int64
        remainingAmount:
          type: integer
          description: A remainingAmount IS AN amount in cents THAT describes the remaining amount of monetary value on balance
          format: int64
    BSSOkResponse:
      required:
        - referenceId
      type: object
      properties:
        referenceId:
          type: string
          description: Reference identification code
          example: BSS-1615326528285
      description: Ok response object
    FareCorrection:
      required:
        - xbot
        - tripId
        - tripVersion
        - legId
        - businessEntityId
        - amountCorrected
        - timestamp
      type: object
      properties:
        xbot:
          type: string
          description: Token identification code (backoffice token)
          example: '12272277752953521453'
        tripId:
          description: Trip identification number of the trip to be fare corrected
          example: 73757
          type: integer
        tripVersion:
          description: Version of the trip to be fare corrected
          example: 1
          type: integer
        legId:
          type: integer
          description: Leg id of the trip to be fare corrected
          example: 141411
        businessEntityId:
          type: integer
          description: Business entity identity
          example: 904
        amountCorrected:
          type: integer
          description: Fare correction amount in cents
          example: -200
        timestamp:
          type: string
          description: Timestamp of the fare correction
          format: date-time
          example: '2019-11-25T17:39:45.000Z'
        reason:
          type: string
          description: Reason of the fare correction
          example: Refund due to duplicate charge
      description: JSON schema for FareCorrection message
    GetOpenDebt:
      required:
        - xbot
        - debt
        - trips
      description: JSON schema for getOpenDebtMessage
      type: object
      properties:
        xbot:
          description: Token identification code (backoffice token)
          example: '12272277752953521453'
          type: string
        debt:
          description: The total value od the debt in cents
          example: 120
          type: integer
        trips:
          description: List of trips the debt is related to
          type: array
          items:
            $ref: '#/components/schemas/Trip'
    PaymentDetailDto:
      type: object
      description: A PaymentDetail IS AN object THAT describes a Payment in detail
      properties:
        paymentId:
          type: string
          description: A paymentId IS AN unique identifier THAT distinguishes a Payment from all other Payments
        serviceReferenceId:
          type: string
          description: A serviceReferenceId IS A identifier THAT can be used externally by end users to refer to this Payment and is shown on their bank statement
        pnReference:
          type: string
          description: A pnReference IS A unique identifier THAT references the request that has been sent to the acquirer
        paymentDateTime:
          type: string
          description: A paymentDateTime IS A date, time and time zone indication THAT describes when the Payment was initiated
          format: date-time
        accountBalance:
          $ref: '#/components/schemas/AccountBalanceDto'
        totalDue:
          type: integer
          description: A totalDue IS AN amount in cents THAT is due for this Payment
          format: int64
        totalPaid:
          type: integer
          description: A totalPaid IS AN amount in cents THAT describes the amount actually paid as a result of this Payment
          format: int64
        rejectionCode:
          type: string
          description: A rejectionCode IS AN identifier THAT references a specific error that has been returned by the Payment Service Provider
        rejectionMessage:
          type: string
          description: A rejectionMessage IS A string THAT contains a functional description of the response
        rejectionReason:
          type: string
          description: A rejectionReason IS AN enumerated identifier THAT describes if the Payment was rejected because of a known reason (RFU)
          enum:
            - REJECTED
            - UNKNOWN
        paymentReason:
          type: string
          description: >-
            A paymentReason IS AN enumerated identifier THAT defines the reason for which the Payment was created
            "TRIP" - Payment for the trip, "REFUND" - Refund payment in case original price was corrected, "RESERVATION" - Reservation of money for future trips (pre-authorisation), "ACCOUNT_VERIFICATION" - Zero value payment or reservation to verify account, "DEBT_RECOVERY" - Recovery of debt caused by previously rejected payment, "CANCEL_RESERVATION" - Cancelation of not used amount reservation, "CANCEL" - Cancelation of payment, "BALANCE_CREATE" - system internal account balance is created in following scenarios - Goodwill to trip, Trip reconstruction or correction, Excessive payment amount caused by external settlement, Fallback due to failed EMV refund, "BALANCE_CREATE_GOODWILL" - Customer Service of PTO handles the complaint of a customer and decides on leniency toward the already paid amount, "TOP_UP" - Customer adds money to the Stored Value Wallet, "WITHDRAWAL" - Customer withdraws remaining money from the Stored Value Wallet
          enum:
            - TRIP
            - REFUND
            - RESERVATION
            - ACCOUNT_VERIFICATION
            - DEBT_RECOVERY
            - CANCEL_RESERVATION
            - CANCEL
            - BALANCE_CREATE
            - BALANCE_CREATE_GOODWILL
            - TOP_UP
            - WITHDRAWAL
        currency:
          type: string
          description: A currency IS AN enumerated identifier THAT references in which currency all amounts within the Payment are expressed (ISO 4217)
        trips:
          type: array
          description: A trips IS A collection of Trips THAT are related to this Payment
          items:
            $ref: '#/components/schemas/TripLineItemDto'
        paymentMethodIcon:
          type: string
          description: A paymentMethodIcon IS AN URL THAT references the location of an icon corresponding to the Payment method
        paymentMethodName:
          type: string
          description: >-
            A paymentMethodName IS AN enumerated identifier THAT defines the used payment method
            "EMV" - EuroCard, MasterCard, Visa, "DDM" - Direct debit mandate, "SSP" - Self service platform, external payment, "BAL" - Internal account balance, "POSTPAID" - Postpaid payment provider
          enum:
            - EMV
            - DDM
            - SSP
            - BAL
            - POSTPAID
            - BUNQ_EPURSE
        paymentMethodId:
          type: string
          description: A paymentMethodId IS A unique identifier THAT distinguishes a Payment Provider from all other Payment Providers
        paymentProviderName:
          type: string
          description: A paymentProviderName IS A name THAT represents the Payment Provider in a human-readable way
        paymentMethodMode:
          type: string
          description: A paymentMethodMode IS AN enumerated identifier THAT describes the mode of the Payment Method Provider
        maskedCardNumber:
          type: string
          description: A maskedCardNumber IS AN masked identifier THAT references a Primary Account Number (PAN)
        paymentToken:
          type: string
          description: A paymentToken IS A unique identifier THAT references the External Backoffice Token of the payment card
        xbot:
          type: string
          description: A xBOT IS AN unique identifier THAT is an external representation of a backoffice Token for a particular Business Entity
          format: uuid
        tripCosts:
          type: integer
          description: A tripCosts IS AN amount in cents THAT describes the cost of the Trip(s)
          format: int64
        vat:
          type: integer
          description: A VAT IS AN amount THAT describes the added value added tax
          format: int64
        tripCostsMinusVat:
          type: integer
          description: A tripCostsMinusVat IS AN amount in cents THAT describes the cost of the Trip(s) without the VAT (RFU)
          format: int64
        chargeId:
          type: integer
          description: A chargeId IS A unique identifier THAT references a Payment for a specific Payment Method
          format: int64
        status:
          type: string
          description: A status IS AN enumerated identifier THAT describes the result of the Payment
          enum:
            - OK
            - REJECTED
            - TECHNICAL_ERROR
        externalAccountId:
          type: string
          description: AN externalAccountId IS AN identifier THAT references the ID of the external account as set by the Payment Service Provider
        paymentProviderBusinessEntityId:
          type: string
          description: A paymentProviderBusinessEntityId IS AN unique identifier THAT references the Business Entity ID of the Payment Service Provider
        createdAt:
          type: string
          description: A createdAt IS A date, time and time zone indication THAT describes when the Payment was received by the Notification processor
    PaymentDto:
      type: object
