      properties:
        vehicleDirectionType:
          type: string
          description: A vehicleDirectionType IS A direction THAT describes the direction in which the Service Pattern is serviced if filled by the Device
        lineId:
          type: string
          description: A lineId IS A identifier THAT distinguishes one line from all other lines in the network.
        transactionTimestamp:
          type: string
          description: A transactionTimestamp IS A date# time and time zone indication THAT describes when the Transaction was created callee.
          format: date-time
        deviceId:
          type: string
          description: A deviceId IS AN unique identifier THAT distinguishes a Device from all other Devices
