          format: uuid
        xspit:
          type: string
          description: AN xspit IS A token THAT references a Sales Package instance relating to the Business Entity of the callee
          format: uuid
        organisationId:
          type: string
          description: AN organisationId IS AN unique identifier THAT references the Product Owner organisation
        category:
          type: string
          description: A category IS A name THAT describes whether the Product that has been applied as a system default or as a sold item
          enum:
            - SALES
            - INTERNAL
        auditing:
          type: object
          properties: {}
          description: AN auditing IS AN object THAT contains Audit data if it is embedded in the Product instance
        typesOfFareProduct:
          type: array
          description: typesOfFareProduct IS A collection THAT contains a list of Product Category types
          items:
            $ref: '#/components/schemas/TypeOfFareProductDto'
        profileInstance:
          $ref: '#/components/schemas/ProfileInstanceDto'
        xpit:
          type: string
          description: External Product Instance Token
    ProfileInstanceDto:
      type: object
      description: A ProfileInstanceDto IS AN object THAT describes a Profile that is related to a Business Entity
      properties:
        profileType:
          type: string
          description: A profileType IS A unique identifier THAT is used to distinguish this Profile from all other Profiles
          example: 199900102
        name:
          type: string
          description: A profileName IS A name THAT is used to describe the Profile in a human-readable way
          example: Disabled passenger
        description:
          type: string
          description: A description IS A string THAT adds additional context to the Profile
          example: Disabled passenger eligible for disability discounts
        xprofit:
          type: string
          description: AN xprofit IS A token THAT references a Profile instance relating to the Business Entity of the callee
          example: 5d6a84a8-31b0-4be0-9ae8-b254b7abf869
    TimePeriodDto:
      type: object
      description: A TimePeriodDto IS AN object THAT represents a temporal duration
      properties:
        timePeriodId:
          type: string
          description: A timePeriodId IS A unique identifier THAT distinguished an applied Product that has a limited temporal validity
        timePeriodName:
          description: A timePeriodName IS A name THAT represent the Time Period in a human-readable way
          $ref: '#/components/schemas/PropertyBagDto'
    TripDetailDto:
      type: object
      description: A TripDetailDto IS AN object THAT ...
      properties:
        tripId:
          type: integer
          description: A tripId IS AN identifier THAT distinguishes this Trip from all other Trips
          format: int64
        tripVersion:
          type: integer
          description: A tripVersion IS A number THAT represents the version of this Trip
          format: int64
        tripStatus:
          type: string
          description: >-
            A tripStatus IS AN enumerated identifier THAT defines the status of this explicit version of this Trip
            "COMPLETE" - has CKI and CKO, "CORRECTED" - was corrected by cardholder or support personnel, "CKI_EXPECTED" - system is waiting for a Check In transaction, "CKI_MISSING" - system stopped waiting for a Check In transaction, "CKO_EXPECTED" - system is waiting for a Check Out transaction, "CKO_MISSING" - system stopped waiting for a Check Out transaction, "ISN_PENDING" - inspection has taken place, but system is waiting for more transactions, "ISN_ONLY" - Inspection took place, but cardholder has not checked in
          enum:
            - COMPLETE
            - CORRECTED
            - CKI_EXPECTED
            - CKO_EXPECTED
            - CKI_MISSING
            - CKO_MISSING
            - ISN_PENDING
            - ISN_ONLY
        organisationIcon:
          type: string
          description: AN organisationIcon IS A location THAT describes where the icon for this organisation is stored
        organisationId:
          type: string
          description: AN organisationId IS A unique identifier THAT references the specific Public Transport Operator
        organisationName:
          type: string
          description: AN organisationName IS A name THAT describes the name of the Business Entity in the GBO, originates from Tariff Fragment
        appliedValue:
          type: integer
          description: (RFU)
          format: int64
        vat:
          type: integer
          description: A VAT IS AN amount THAT describes the calculated amount of value added tax (RFU)
          format: int64
        supersededByTripIds:
          type: array
          description: A supersededByTripIds IS A collection of identifiers THAT contains references to (a) Trip(s) that replace(s) this Trip
          items:
            type: integer
            format: int64
        supersedesTripIds:
          type: array
          description: A supersedesTripIds IS A collection of identifiers THAT contains references to (a) Trip(s) that this Trip replaces
          items:
            type: integer
            format: int64
        products:
          type: array
          description: >-
            A products IS A collection of Products THAT have been applied to the Trip
            (Auditing is not supported on this level)
          items:
            $ref: '#/components/schemas/ProductDto'
        checkinTransactionTimestamp:
          type: string
          description: A checkInTransactionTimestamp IS A Transaction Timestamp THAT describes when the Transaction was created either by a Device or callee
          format: date-time
        checkoutTransactionTimestamp:
          type: string
          description: A checkOutTransactionTimestamp IS A Transaction Timestamp THAT describes when the Transaction was created either by a Device or callee
          format: date-time
        checkinTransactionReference:
          type: string
          description: >-
            A checkInTransactionReference IS A Transaction Reference THAT is used to distinguish 
            one Transaction from all other Transactions by combining DeviceId, Transaction Sequence Number and EMV or Transaction Id
        checkoutTransactionReference:
          type: string
          description: >-
            A checkOutTransactionReference IS A Transaction Reference THAT is used to distinguish one 
            Transaction from all other Transactions by combining DeviceId, Transaction Sequence Number and EMV or Transaction Id
        checkinLocation:
          description: A checkInLocation IS A Tariff Location THAT presents the Location at which the Trip has started
          $ref: '#/components/schemas/StopDto'
        checkoutLocation:
          description: A checkOutLocation IS A Tariff Location THAT presents the Location at which the Trip has ended
          $ref: '#/components/schemas/StopDto'
        xbot:
          type: string
          description: AN xBOT IS A unique identifier THAT is an external representation of a backoffice Token for a particular Business Entity, inherited from a Transaction used within the Trip construction
          format: uuid
        tokenType:
          type: string
          description: A tokenType IS AN enumerated identifier THAT describes the type of Token
        tokenNumber:
          type: string
          description: Number of the token (RFU)
        tokenNickname:
          type: string
          description: Nickname of the token (RFU)
        transportType:
          type: string
          description: A transportType IS AN enumerated identifier THAT describes the mode of transport
          enum:
            - AIR
            - BUS
            - COACH
            - FUNICULAR
            - METRO
            - RAIL
            - TROLLEYBUS
            - TRAM
            - WATER
            - CABLEWAY
            - OTHER
        lineId:
          type: string
          description: A lineId IS A lineId THAT is taken from the Check In Transaction
        lineName:
          type: string
          description: A lineName IS A name THAT represent a specific Line in a human-readable way
        networkId:
          type: string
          description: A networkId IS A unique identifier THAT distinguishes one Network from all other Networks
        networkName:
          type: string
          description: A networkName IS A name THAT represent the Network referenced by the Network Id in a human-readable form
        currency:
          type: string
          description: A currency IS AN enumerated identifier THAT references in which currency all amounts within the Trip are expressed (ISO 4217)
        transportIcon:
          type: string
          description: A transportIcon IS AN URL THAT describes the location where the icon for the specific transportType is stored
        legs:
          type: array
          description: A legs IS A collection of Leg objects THAT represents the different parts of the Trip
          items:
            $ref: '#/components/schemas/LegDto'
        lastUpdatedTripDateTime:
          type: string
          description: lastUpdatedTripDateTime IS A date, time and time zone indication THAT describes the most recent moment the Trip was updated
          format: date-time
        fare:
          type: integer
          description: A fare IS AN amount in cents THAT represents the total price to be paid for the Trip
          format: int64
        loyaltyOrDiscount:
          type: boolean
          description: A loyaltyOrDiscount IS A boolean THAT represent if a loyalty or discount has been applied to the fare
        supportCode:
          type: string
          description: A supportCode IS A unique identifier THAT combines tripId and tripVersion
        tripVersionReason:
          type: string
          description: >-
            A tripVersionReason IS AN enumerated identifier THAT defines the reason why a specific version of this Trip was created
            "NEW" - New trip, "FARE" - Fare has changed for the trip, "PROPERTY" - Some property of the trip has changed, "STRUCTURE" - Structure of the trip has changed, "OUTDATED" - The trip was outdated, "RECALCULATE" - The trip was recalculated due to tariff change
          enum:
            - NEW
            - FARE
            - PROPERTY
            - STRUCTURE
            - OUTDATED
            - RECALCULATE
        nature:
          type: string
          description: >-
            nature IS AN enumerated identifier THAT defines the special nature of the Trip
            \"ACCESS_DENIED\" - Access for passenger through the gate is denied, \"SAME_LOCATION_EXIT\" - Passenger checks-out at the same location as checked-in, \"OTHERS_RIDE\" - for the PTOs where the wrong check-out was done (aka invalid), \"OTHERS_TAPS\" - for PTOs to know that other TAP was done on the different network (aka autocorrected), \"OTHERS_LEGS\" - for future (shared) trips. Trip will contain transaction taps from both PTOs with synthetic taps somewhere in between
          enum:
            - ACCESS_DENIED
            - SAME_LOCATION_EXIT
            - OTHERS_RIDE
            - OTHERS_TAPS
            - OTHERS_LEGS
        payments:
          type: array
          description: payments IS A collection of Payments THAT are linked to the Trip
          items:
            $ref: '#/components/schemas/PaymentDto'
        checkinTransactionId:
          type: string
          description: A checkInTransactionId IS A Transaction Id THAT represents the Transaction that is used as Check In Transaction
        checkoutTransactionId:
          type: string
          description: A checkOutTransactionId IS A Transaction Id THAT represents the Transaction that is used as Check Out Transaction
        transportSubType:
          type: string
          description: A transportSubType IS AN enumerated identifier THAT specifies the transport more precisely within a given type
        tariffVersionId:
          type: string
          description: A tariffVersionId IS AN identifier THAT references the Tariff Fragment and Tariff Fragment version that was used to create the Trip and calculate the Fare
        correlationId:
          type: string
          description: A correlationId IS A unique identifier THAT references a tripAuditing record
        auditing:
          type: object
          properties: {}
          description: Trip auditing data - if embed auditing is allowed
        settlements:
          type: array
          description: settlements IS A collection of Settlements THAT are linked to the Trip
          items:
            $ref: '#/components/schemas/TripSettlementDto'
        createdAt:
          type: string
          description: A createdAt IS A date, time and time zone indication THAT describes when the Trip was received by the Notification processor
        entryTariffLocation:
          $ref: '#/components/schemas/StopDto'
        traveledLines:
          type: array
          description: traveledLines IS A collection of Lines THAT have been used for this Trip
          items:
            $ref: '#/components/schemas/LineDto'
        tripStartTxnId:
          type: integer
          description: >-
            Trip CKI transaction identifier. Contains value of the CKI backOfficeTxnId attribute
          format: int64
        tripEndTxnId:
          type: integer
          description: >-
            Trip CKO transaction identifier. Contains value of the CKO backOfficeTxnId attribute
          format: int64
        numberOfSyntheticLegs:
          type: integer
          description: >-
            Number of real PTO trip segments (legs) travelled between CKI and CKO
          format: int64
        numberOfSyntheticTrips:
          type: integer
          description: Number of trips at real PTOs made between CKI and CKO
          format: int64
    TripSettlementDto:
